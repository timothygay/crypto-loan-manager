// ═══════════════════════════════════════════════════════════════════════════════
// ROOT APP — Bybit live prices via /v5/market/tickers, every 60s
// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// FCN MODULE — Fixed Coupon Note
// ═══════════════════════════════════════════════════════════════════════════════

const FCN_CURRENCIES = ['BTC','ETH','ADA','XRP','USDT','USDC'];
const FCN_CRYPTO = ['BTC','ETH','ADA','XRP'];
const FCN_STABLE = ['USDT','USDC'];
const isCrypto = (ccy) => FCN_CRYPTO.includes(ccy);

// Format notional/coupon values
const fmtFCN = (val, ccy) => {
    if (val === null || val === undefined || isNaN(val)) return '—';
    return isCrypto(ccy)
        ? Number(val).toFixed(8)
        : Number(val).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
};
const fmtFCNCompact = (val, ccy) => {
    if (val === null || val === undefined || isNaN(val)) return '—';
    return isCrypto(ccy)
        ? Number(val).toFixed(4)
        : '$' + Number(val).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
};

// Build settlement schedule
const buildFCNSchedule = (trade) => {
    if (!trade.tradeDate || !trade.maturityDate) return [];
    const dates = [];
    const maturity = new Date(trade.maturityDate + 'T00:00:00Z');
    let current = new Date(trade.tradeDate + 'T00:00:00Z');
    const isWeekly = trade.tenorUnit === 'weeks';
    while (true) {
        if (isWeekly) current = new Date(current.getTime() + 7*86400000);
        else { const d = new Date(current); d.setUTCMonth(d.getUTCMonth()+1); current = d; }
        if (current >= maturity) { dates.push({date:trade.maturityDate,isMaturity:true}); break; }
        dates.push({date:current.toISOString().split('T')[0],isMaturity:false});
    }
    return dates;
};

// Coupon per period — always on original notional
// For crypto notional + stablecoin coupon: convert at first underlying's spotRef
const calcFCNCoupon = (trade) => {
    const notional = parseFloat(trade.notionalAmount) || 0;
    const rate = parseFloat(trade.couponRate) || 0;
    const divisor = trade.tenorUnit === 'weeks' ? 52 : 12;
    let base = notional;
    const underlyings = trade.underlyings || [];
    if (isCrypto(trade.notionalCurrency) && !isCrypto(trade.couponCurrency) && underlyings.length > 0) {
        base = notional * (parseFloat(underlyings[0].spotRef) || 0);
    }
    return base * rate / 100 / divisor;
};

const isWeekend = (dateStr) => { const d = new Date(dateStr+'T00:00:00Z'); const day=d.getUTCDay(); return day===0||day===6; };
const dayName  = (dateStr) => ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(dateStr+'T00:00:00Z').getUTCDay()];

const FCN_STATUS_BADGE = {
    'Active':      'bg-green-500/15 text-green-400 border-green-500/30',
    'Knocked Out': 'bg-orange-500/15 text-orange-400 border-orange-500/30',
    'Exercised':   'bg-purple-500/15 text-purple-400 border-purple-500/30',
    'Matured':     'bg-blue-500/15 text-blue-400 border-blue-500/30',
};

// Get live price for an underlying pair (e.g. "BTC/USDT" → prices["BTC"])
const getPriceForPair = (pair, prices) => {
    if (!pair) return 0;
    const base = pair.split('/')[0];
    return prices[base] || 0;
};

// Barrier check logic — returns updated trade or same trade
const checkBarriers = (trade, prices, todayStr, isSettlementToday, isMaturityToday) => {
    if (trade.status !== 'Active' || !isSettlementToday) return trade;
    const underlyings = trade.underlyings || [];
    if (!underlyings.length) return trade;
    const isStable = !isCrypto(trade.notionalCurrency);
    let updated = {...trade};

    if (isStable) {
        // Variant B/C: stablecoin notional
        // KO: ANY underlying price ABOVE its own koPrice → knocked out
        if (underlyings.some(u => u.koEnabled)) {
            for (const u of underlyings) {
                if (!u.koEnabled) continue;
                const price = getPriceForPair(u.pair, prices);
                if (price > 0 && price > parseFloat(u.koPrice)) {
                    updated.status = 'Knocked Out';
                    return updated;
                }
            }
        }
        // Maturity checks
        if (isMaturityToday) {
            // Find any underlying below its strike
            const belowStrike = underlyings.filter(u => {
                const price = getPriceForPair(u.pair, prices);
                return price > 0 && price < parseFloat(u.strikePrice);
            });
            if (belowStrike.length > 0) {
                // Worst-off: largest % below its own strike
                const worstOff = belowStrike.reduce((worst, u) => {
                    const price = getPriceForPair(u.pair, prices);
                    const pct = (parseFloat(u.strikePrice) - price) / parseFloat(u.strikePrice);
                    const worstPct = (parseFloat(worst.strikePrice) - getPriceForPair(worst.pair, prices)) / parseFloat(worst.strikePrice);
                    return pct > worstPct ? u : worst;
                });
                updated.status = 'Exercised';
                updated.worstOffPair = worstOff.pair;
                updated.worstOffStrike = worstOff.strikePrice;
            } else {
                updated.status = 'Matured';
            }
        }
    } else {
        // Variant A: crypto notional
        const u = underlyings[0];
        if (!u) return trade;
        const price = getPriceForPair(u.pair, prices);
        if (!price) return trade;
        // KO: price BELOW koPrice
        if (u.koEnabled) {
            if (price < parseFloat(u.koPrice)) { updated.status = 'Knocked Out'; return updated; }
        }
        // KI check
        if (trade.knockInEnabled && !trade.knockInTriggered) {
            if (price < parseFloat(trade.knockInPrice)) updated.knockInTriggered = true;
        }
        // Maturity
        if (isMaturityToday) {
            if (price > parseFloat(u.strikePrice) && trade.knockInTriggered) updated.status = 'Exercised';
            else updated.status = 'Matured';
        }
    }
    return updated;
};

// Sheets call
const fcnSheetsCall = async (url, payload) => {
    const qs = Object.entries(payload).map(([k,v])=>`${k}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`).join('&');
    const res = await fetch(`${url}?${qs}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error||'FCN Sheets error');
    return data;
};

// Serialize trade for Sheets (underlyings as JSON string in one column)
const tradToRow = (trade) => [
    trade.id, trade.clientName, trade.tradeDate, trade.tenorValue, trade.tenorUnit,
    trade.maturityDate, trade.notionalCurrency, trade.notionalAmount,
    trade.couponCurrency, trade.couponRate, trade.settlementFrequency,
    JSON.stringify(trade.underlyings||[]),
    trade.knockInEnabled?'YES':'NO', trade.knockInPrice||'',
    trade.status, trade.knockInTriggered?'YES':'NO',
    (trade.paidSettlements||[]).join('|'),
    trade.worstOffPair||'', trade.worstOffStrike||'',
    trade.upfrontFee||0, trade.upfrontAmount||0, trade.upfrontFeeUnderlying||'USDT',
    trade.createdAt||new Date().toISOString()
];

// Deserialize trade from Sheets row
const rowToTrade = (r) => ({
    id:r[0], clientName:r[1], tradeDate:r[2],
    tenorValue:r[3], tenorUnit:r[4], maturityDate:r[5],
    notionalCurrency:r[6], notionalAmount:r[7],
    couponCurrency:r[8], couponRate:r[9], settlementFrequency:r[10],
    underlyings: (() => { try { return JSON.parse(r[11]||'[]'); } catch { return []; } })(),
    knockInEnabled:r[12]==='YES', knockInPrice:r[13],
    status:r[14], knockInTriggered:r[15]==='YES',
    paidSettlements:r[16]?String(r[16]).split('|').filter(Boolean):[],
    worstOffPair:r[17]||'', worstOffStrike:r[18]||'',
    upfrontFee:r[19]||0, upfrontAmount:r[20]||0, upfrontFeeUnderlying:r[21]||'USDT',
    createdAt:r[22],
});

// ─── FCN DASHBOARD ────────────────────────────────────────────────────────────
const FCNDashboard = ({trades, prices, onConfirmPayment}) => {
    const today = todayUTC();
    const in7 = new Date(new Date().getTime()+7*86400000).toISOString().split('T')[0];
    const activeTrades = trades.filter(t=>t.status==='Active');

    // Portfolio by notional currency
    const currencyGroups = {};
    activeTrades.forEach(t => {
        if (!currencyGroups[t.notionalCurrency]) currencyGroups[t.notionalCurrency]=0;
        currencyGroups[t.notionalCurrency]+=parseFloat(t.notionalAmount)||0;
    });

    // Live prices — show crypto underlyings actually referenced in active trades
    const liveSymbols = [...new Set(
        activeTrades.flatMap(t=>(t.underlyings||[]).map(u=>(u.pair||'').split('/')[0]).filter(s=>FCN_CRYPTO.includes(s)))
    )];

    // Build overdue (past 30 days, unpaid) and upcoming (next 7 days) settlement lists
    const past30fcn = new Date(new Date().getTime()-30*86400000).toISOString().split('T')[0];
    const overdueF = [], upcoming = [];
    trades.forEach(trade => {
        if (!['Active','Knocked Out','Exercised','Matured'].includes(trade.status)) return;
        const sched = buildFCNSchedule(trade);
        const coupon = calcFCNCoupon(trade);
        sched.forEach(({date,isMaturity}) => {
            if ((trade.paidSettlements||[]).includes(date)) return;
            const entry = {trade,date,isMaturity,coupon,weekend:isWeekend(date)};
            if (date < today && date >= past30fcn) overdueF.push(entry);
            else if (date >= today && date <= in7) upcoming.push(entry);
        });
    });
    overdueF.sort((a,b)=>b.date.localeCompare(a.date));
    upcoming.sort((a,b)=>a.date.localeCompare(b.date));

    // Monthly coupon totals
    const now = new Date();
    const prevMo = now.getMonth()===0?11:now.getMonth()-1;
    const prevYr = now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const calcPeriodCoupons = (yr, mo) => {
        const ps=new Date(yr,mo,1), pe=new Date(yr,mo+1,1), total={};
        activeTrades.forEach(t => {
            const coupon=calcFCNCoupon(t);
            buildFCNSchedule(t).forEach(({date})=>{
                const d=new Date(date+'T00:00:00Z');
                if (d>=ps&&d<pe) total[t.couponCurrency]=(total[t.couponCurrency]||0)+coupon;
            });
        });
        return total;
    };
    const prevCoupons = calcPeriodCoupons(prevYr,prevMo);
    const currCoupons = calcPeriodCoupons(now.getFullYear(),now.getMonth());
    const prevMonthName = new Date(prevYr,prevMo,1).toLocaleString('en-SG',{month:'long',year:'numeric'});
    const currMonthName = now.toLocaleString('en-SG',{month:'long',year:'numeric'});

    return (
        <div className="mb-6">
            <div className="flex items-center justify-between mb-3">
                <h2 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 inline-block"/>FCN Dashboard
                </h2>
            </div>

            {/* Live prices for underlying crypto */}
            {liveSymbols.length>0&&(
                <div className={`grid grid-cols-${Math.min(liveSymbols.length,3)} gap-2 mb-3`}>
                    {liveSymbols.map(sym=>(
                        <div key={sym} className="card p-3 flex items-center justify-between">
                            <div>
                                <p className="text-xs text-slate-400">{sym} · Binance Live</p>
                                <p className="text-lg font-bold mono text-cyan-400">{prices[sym]?`$${fmt(prices[sym],2)}`:'—'}</p>
                            </div>
                            <span className="text-2xl opacity-40">{sym==='BTC'?'₿':sym==='ETH'?'Ξ':'◈'}</span>
                        </div>
                    ))}
                </div>
            )}

            <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
                {/* Active notional */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-2 font-medium">Active FCN Notional</p>
                    <p className="text-xl font-bold mono text-white mb-2">{activeTrades.length} trade{activeTrades.length!==1?'s':''}</p>
                    <div className="space-y-1.5">
                        {Object.entries(currencyGroups).map(([ccy,total])=>(
                            <div key={ccy} className="flex justify-between text-xs">
                                <span className="text-slate-400">{ccy}</span>
                                <span className="mono text-white">{fmtFCN(total,ccy)} {ccy}</span>
                            </div>
                        ))}
                    </div>
                </div>

                {/* Previous month coupon */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-0.5 font-medium">Coupon — {prevMonthName}</p>
                    <p className="text-[10px] text-slate-600 mb-2">All settlements falling in this month</p>
                    {Object.keys(prevCoupons).length===0
                        ?<p className="text-sm text-slate-500">No settlements</p>
                        :Object.entries(prevCoupons).map(([ccy,amt])=>(
                            <p key={ccy} className="text-xl font-bold mono text-yellow-400">{fmtFCNCompact(amt,ccy)} {ccy}</p>
                        ))
                    }
                </div>

                {/* Current month coupon */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-0.5 font-medium">Coupon — {currMonthName} (MTD)</p>
                    <p className="text-[10px] text-slate-600 mb-2">All settlements falling in this month</p>
                    {Object.keys(currCoupons).length===0
                        ?<p className="text-sm text-slate-500">No settlements</p>
                        :Object.entries(currCoupons).map(([ccy,amt])=>(
                            <p key={ccy} className="text-xl font-bold mono text-yellow-400">{fmtFCNCompact(amt,ccy)} {ccy}</p>
                        ))
                    }
                </div>
            </div>

            {/* FCN settlements — shared row renderer */}
            {(()=>{
                const renderFCNRow = (s, i, isPast) => {
                    const underlyings = s.trade.underlyings||[];
                    const isStableNotional = !isCrypto(s.trade.notionalCurrency);
                    // Maturity outcome for display
                    let maturityNote = null;
                    if (s.isMaturity) {
                        if (s.trade.status==='Exercised') {
                            maturityNote = s.trade.worstOffPair
                                ? `Exercised — worst-of ${s.trade.worstOffPair} @ $${fmt(parseFloat(s.trade.worstOffStrike),2)}`
                                : 'Exercised';
                        } else if (s.trade.status==='Knocked Out') {
                            maturityNote = 'Knocked Out';
                        } else {
                            maturityNote = 'Matured — notional returned';
                        }
                    }
                    const rowBg = isPast
                        ? 'bg-amber-900/15'
                        : s.isMaturity ? 'bg-cyan-900/10' : s.weekend ? 'bg-amber-900/10' : '';
                    return (
                        <tr key={i} className={`border-b border-slate-800/50 ${rowBg}`}>
                            <td className="px-3 py-2.5 font-medium text-slate-200">
                                {s.trade.clientName}
                                {isPast&&<span className="ml-1.5 px-1 py-0.5 bg-amber-900/40 text-amber-400 rounded text-[9px]">OVERDUE</span>}
                            </td>
                            <td className={`px-3 py-2.5 mono ${isPast?'text-amber-400':s.isMaturity?'text-cyan-400':s.weekend?'text-amber-400':'text-slate-300'}`}>
                                {s.date}{s.weekend&&<span className="ml-1 text-[10px] text-amber-500">WE</span>}
                            </td>
                            <td className="px-3 py-2.5 text-slate-400">{dayName(s.date)}</td>
                            <td className="px-3 py-2.5 mono text-yellow-400 font-medium">
                                {s.isMaturity
                                    ?<span>{fmtFCNCompact(s.coupon,s.trade.couponCurrency)} <span className="text-slate-500">+ notional</span></span>
                                    :fmtFCNCompact(s.coupon,s.trade.couponCurrency)
                                }
                            </td>
                            <td className="px-3 py-2.5 text-slate-400">{s.trade.couponCurrency}</td>
                            <td className="px-3 py-2.5">
                                {maturityNote
                                    ? <span className={`text-xs ${s.trade.status==='Exercised'?'text-purple-400':s.trade.status==='Knocked Out'?'text-orange-400':'text-blue-400'}`}>{maturityNote}</span>
                                    : <div className="space-y-0.5">
                                        {underlyings.map((u,ui)=>{
                                            const liveP=getPriceForPair(u.pair,prices);
                                            const ko=u.koEnabled?parseFloat(u.koPrice):null;
                                            const strike=parseFloat(u.strikePrice)||0;
                                            const isAboveKO=ko&&liveP>0&&liveP>ko;
                                            return(
                                                <div key={ui} className="flex items-center gap-1.5 flex-wrap">
                                                    <span className="text-slate-500 text-[10px]">{u.pair}</span>
                                                    {ko&&<><span className={`mono text-[10px] ${isAboveKO?'text-red-400':'text-orange-400'}`}>${fmt(ko,2)}</span><span className="text-slate-600 text-[9px]">KO</span></>}
                                                    <span className="mono text-[10px] text-purple-400">${fmt(strike,2)}</span><span className="text-slate-600 text-[9px]">STRIKE</span>
                                                    {!isPast&&liveP>0&&<span className="text-slate-500 text-[9px]">live:${fmt(liveP,2)}</span>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                }
                            </td>
                            <td className="px-3 py-2.5">
                                {s.isMaturity
                                    ?<span className="px-1.5 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-[10px]">MATURITY</span>
                                    :<span className="px-1.5 py-0.5 bg-slate-700 text-slate-400 rounded text-[10px]">COUPON</span>
                                }
                            </td>
                            <td className="px-3 py-2.5">
                                <button onClick={()=>onConfirmPayment(s.trade.id,s.date)}
                                    className={`px-2 py-1 border rounded text-[10px] transition-colors whitespace-nowrap ${isPast?'bg-amber-600/20 hover:bg-amber-600/40 border-amber-500/30 text-amber-400':'bg-green-600/20 hover:bg-green-600/40 border-green-500/30 text-green-400'}`}>
                                    ✓ Confirm
                                </button>
                            </td>
                        </tr>
                    );
                };
                const fcnHeaders = ['Client','Date','Day','Coupon','CCY','Underlying(s) — KO / Strike','Type','Action'];
                const fcnThead = (<thead><tr className="border-b border-slate-800 bg-slate-900/40">{fcnHeaders.map(h=>(<th key={h} className="text-left px-3 py-2.5 text-slate-400 font-medium whitespace-nowrap">{h}</th>))}</tr></thead>);
                return (<>
                    {overdueF.length>0&&(
                        <div className="card overflow-hidden mb-3">
                            <div className="px-4 py-3 border-b border-amber-800/30 bg-amber-900/10 flex items-center justify-between">
                                <p className="text-sm font-semibold text-amber-400 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-amber-400 inline-block animate-pulse"/>
                                    Overdue Settlements (Last 30 Days)
                                </p>
                                <span className="text-xs text-amber-500/70">{overdueF.length} unconfirmed</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">{fcnThead}<tbody>{overdueF.map((s,i)=>renderFCNRow(s,i,true))}</tbody></table>
                            </div>
                        </div>
                    )}
                    {upcoming.length>0?(
                        <div className="card overflow-hidden">
                            <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
                                <p className="text-sm font-semibold text-slate-300">Settlements Due (Next 7 Days)</p>
                                <span className="text-xs text-slate-500">{upcoming.length} pending</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">{fcnThead}<tbody>{upcoming.map((s,i)=>renderFCNRow(s,i,false))}</tbody></table>
                            </div>
                        </div>
                    ):(
                        <div className="card p-6 text-center text-slate-500 text-sm">No settlements due in the next 7 days.</div>
                    )}
                </>);
            })()}
        </div>
    );
};

// ─── FCN ORDER CARD ───────────────────────────────────────────────────────────
const FCNOrderCard = ({trade,prices,onEdit,onDelete}) => {
    const [expanded,setExpanded]=useState(false);
    const couponPerPeriod=calcFCNCoupon(trade);
    const schedule=buildFCNSchedule(trade);
    const today=todayUTC();
    const paidSettlements=trade.paidSettlements||[];
    const underlyings=trade.underlyings||[];
    const isStable=!isCrypto(trade.notionalCurrency);

    const nextSettlement=schedule.find(s=>s.date>=today&&!paidSettlements.includes(s.date));
    const couponsCollected=paidSettlements.length*couponPerPeriod;
    const statusCls=FCN_STATUS_BADGE[trade.status]||FCN_STATUS_BADGE['Active'];

    // Worst-of exercised info
    const wasExercised=trade.status==='Exercised'&&trade.worstOffPair;
    const fcnCardUpfrontFee=parseFloat(trade.upfrontFee)||0;

    return (
        <div className={`card p-5 ${trade.status!=='Active'?'opacity-80':''}`}>
            <div className="flex flex-wrap justify-between items-start gap-3 mb-4">
                <div>
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                        <h3 className="font-bold text-lg">{trade.clientName}</h3>
                        <span className={`px-2 py-0.5 rounded-full text-xs font-medium border ${statusCls}`}>{trade.status}</span>
                        {trade.knockInTriggered&&<span className="px-2 py-0.5 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/30">⚡ KI Triggered</span>}
                        {wasExercised&&<span className="px-2 py-0.5 rounded-full text-xs bg-purple-500/20 text-purple-400 border border-purple-500/30">Worst-of: {trade.worstOffPair}</span>}
                        {isStable&&underlyings.length>1&&<span className="px-2 py-0.5 rounded-full text-xs bg-cyan-500/20 text-cyan-400 border border-cyan-500/30">Worst-of ({underlyings.length} underlyings)</span>}
                    </div>
                    <p className="text-xs text-slate-500 mono">{trade.id} · {fmtDate(trade.tradeDate)} → {fmtDate(trade.maturityDate)} · {trade.tenorValue} {trade.tenorUnit}</p>
                </div>
                <div className="flex gap-2">
                    <button onClick={()=>setExpanded(!expanded)} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1">Schedule {expanded?'▲':'▼'}</button>
                    <button onClick={()=>onEdit(trade)} className="btn-secondary p-2 rounded-lg"><Icon.Edit/></button>
                    <button onClick={()=>onDelete(trade.id)} className="p-2 rounded-lg bg-red-900/20 border border-red-500/20 text-red-400 hover:bg-red-900/40"><Icon.Trash/></button>
                </div>
            </div>

            {/* Metric cards */}
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 mb-3">
                {[
                    ['Notional',`${fmtFCN(trade.notionalAmount,trade.notionalCurrency)} ${trade.notionalCurrency}`,underlyings.map(u=>u.pair).join(', ')||'—','text-white'],
                    ['Coupon Rate',`${parseFloat(trade.couponRate||0).toFixed(2)}% APR`,`${trade.settlementFrequency} · ${trade.couponCurrency}`,'text-yellow-400'],
                    ['Per Period',fmtFCNCompact(couponPerPeriod,trade.couponCurrency),trade.couponCurrency,'text-yellow-300'],
                    ['P&L Collected',fmtFCNCompact(couponsCollected,trade.couponCurrency),`${paidSettlements.length}/${schedule.length} paid`,'text-cyan-400'],
                    ['Next Settlement',nextSettlement?nextSettlement.date:'None',nextSettlement?dayName(nextSettlement.date):'—',(isWeekend(nextSettlement?.date||'2000-01-01')&&nextSettlement)?'text-amber-400':'text-slate-300'],
                    ['Settlement Freq',trade.settlementFrequency,`${schedule.length} total`,'text-slate-300'],
                ].map(([lbl,val,sub,cls])=>(
                    <div key={lbl} className="card-inner p-3">
                        <p className="text-xs text-slate-400 mb-1 truncate">{lbl}</p>
                        <p className={`font-bold mono text-xs ${cls} truncate`}>{val}</p>
                        <p className="text-xs text-slate-500 truncate">{sub}</p>
                    </div>
                ))}
            </div>

            {/* Underlying pairs barrier strip */}
            <div className="space-y-1.5 mb-3">
                {underlyings.map((u,i)=>{
                    const liveP=getPriceForPair(u.pair,prices);
                    const koP=u.koEnabled?parseFloat(u.koPrice):null;
                    const strikeP=parseFloat(u.strikePrice)||0;
                    const spotRef=parseFloat(u.spotRef)||0;
                    // KI for Variant A
                    const kiP=!isStable&&trade.knockInEnabled?parseFloat(trade.knockInPrice):null;
                    // Buffer calcs
                    const koBuf=koP&&liveP?isStable?(koP-liveP)/liveP*100:(liveP-koP)/liveP*100:null;
                    const kiBuf=kiP&&liveP?(liveP-kiP)/liveP*100:null;
                    const koClose=koBuf!==null&&Math.abs(koBuf)<10;
                    return(
                        <div key={i} className={`rounded-lg px-3 py-2 text-xs border flex flex-wrap items-center gap-3 ${koClose?'bg-amber-900/20 border-amber-500/30':'bg-slate-800/50 border-slate-700'}`}>
                            <span className="font-medium text-slate-300">{u.pair}</span>
                            <span className="text-slate-500">Spot Ref: <span className="mono text-slate-300">${fmt(spotRef,2)}</span></span>
                            {koP&&<span className={koClose?'text-amber-400':'text-orange-400'}>KO: <span className="mono">${fmt(koP,2)}</span>{liveP>0&&<span className="text-slate-500 ml-1">(buf: {fmt(Math.abs(koBuf),1)}%)</span>}</span>}
                            <span className="text-purple-400">Strike: <span className="mono">${fmt(strikeP,2)}</span></span>
                            {kiP&&!isStable&&<span className={kiBuf!==null&&kiBuf<10?'text-red-400':'text-slate-400'}>KI: <span className="mono">${fmt(kiP,2)}</span>{kiBuf!==null&&<span className="ml-1">({fmt(kiBuf,1)}% buf)</span>}</span>}
                            {liveP>0&&<span className="text-slate-400 ml-auto">Live: <span className="mono text-white">${fmt(liveP,2)}</span></span>}
                        </div>
                    );
                })}
            </div>

            {fcnCardUpfrontFee>0&&(
                <div className="flex gap-4 text-xs text-slate-500 mb-3">
                    <span>Upfront Fee: <span className="mono text-slate-300">{fmt(fcnCardUpfrontFee,2)}%</span></span>
                    <span>Fee Underlying: <span className="mono text-slate-300">{trade.upfrontFeeUnderlying||'USDT'}</span></span>
                    <span>Upfront Amount: <span className="mono text-slate-300">{trade.upfrontFeeUnderlying||'USDT'} {fmt(parseFloat(trade.upfrontAmount)||0,isCrypto(trade.upfrontFeeUnderlying||'USDT')?8:2)}</span></span>
                </div>
            )}
            {/* Settlement schedule */}
            {expanded&&(
                <div className="border-t border-slate-800 pt-3 overflow-x-auto">
                    <table className="w-full text-xs">
                        <thead>
                            <tr className="border-b border-slate-800 text-slate-400">
                                {['#','Date','Day','Coupon','Type','Status'].map(h=><th key={h} className="text-left pb-2 pr-3">{h}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {schedule.map(({date,isMaturity},i)=>{
                                const isPast=date<today,isPaid=paidSettlements.includes(date),weekend=isWeekend(date);
                                return(
                                    <tr key={date} className={`border-b border-slate-800/40 ${weekend?'bg-amber-900/10':''} ${isMaturity?'bg-cyan-900/10':''} ${isPast&&!isPaid?'opacity-50':''}`}>
                                        <td className="py-1.5 pr-3 text-slate-500">{i+1}</td>
                                        <td className={`py-1.5 pr-3 mono ${weekend?'text-amber-400':isMaturity?'text-cyan-400':'text-slate-300'}`}>
                                            {date}{weekend&&<span className="ml-1 text-[9px] text-amber-500">WE</span>}
                                        </td>
                                        <td className="py-1.5 pr-3 text-slate-400">{dayName(date)}</td>
                                        <td className="py-1.5 pr-3 mono text-yellow-400">
                                            {isMaturity
                                                ?<span>{fmtFCNCompact(couponPerPeriod,trade.couponCurrency)} + <span className="text-slate-300">{fmtFCN(trade.notionalAmount,trade.notionalCurrency)} {trade.notionalCurrency}</span></span>
                                                :fmtFCNCompact(couponPerPeriod,trade.couponCurrency)
                                            }
                                        </td>
                                        <td className="py-1.5 pr-3">
                                            {isMaturity
                                                ?<span className="px-1.5 py-0.5 bg-cyan-500/20 text-cyan-400 rounded text-[10px]">MATURITY</span>
                                                :<span className="px-1.5 py-0.5 bg-slate-700 text-slate-400 rounded text-[10px]">COUPON</span>
                                            }
                                        </td>
                                        <td className="py-1.5">
                                            {isPaid?<span className="text-green-400">✓ Paid</span>:isPast?<span className="text-red-400">Unpaid</span>:<span className="text-slate-500">Pending</span>}
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};

// ─── FCN FORM MODAL ───────────────────────────────────────────────────────────
const FCNFormModal = ({trade,onSave,onClose}) => {
    const isStable = (ccy) => FCN_STABLE.includes(ccy);

    const defaultUnderlying = (notionalCcy='BTC') => ({
        pair: `${notionalCcy}/USDT`,
        spotRef: '',
        koEnabled: false,
        koPrice: '',
        strikePrice: '',
    });

    const initUnderlyings = trade?.underlyings?.length ? trade.underlyings : [defaultUnderlying(trade?.notionalCurrency||'BTC')];

    const [form,setForm]=useState(trade||{
        clientName:'',tradeDate:todayLocal(),tenorValue:3,tenorUnit:'months',
        notionalCurrency:'BTC',notionalAmount:'',
        couponCurrency:'USDT',couponSameAsNotional:false,
        couponRate:'',settlementFrequency:'Monthly',
        knockInEnabled:false,knockInPrice:'',
        status:'Active',knockInTriggered:false,
        upfrontFee:'0.00',upfrontFeeUnderlying:'USDT',
    });
    const [underlyings,setUnderlyings]=useState(initUnderlyings);
    const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
    const fb=k=>e=>setForm(p=>({...p,[k]:e.target.checked}));

    const notionalIsStable=isStable(form.notionalCurrency);

    // Auto-maturity
    const computeMaturity=()=>{
        if(!form.tradeDate||!form.tenorValue) return '';
        const start=new Date(form.tradeDate+'T00:00:00Z');
        const val=parseInt(form.tenorValue)||0;
        if(form.tenorUnit==='weeks') return new Date(start.getTime()+val*7*86400000).toISOString().split('T')[0];
        const d=new Date(start); d.setUTCMonth(d.getUTCMonth()+val); return d.toISOString().split('T')[0];
    };
    const maturityDate=computeMaturity();

    // Auto settlement freq from tenor unit
    useEffect(()=>setForm(p=>({...p,settlementFrequency:p.tenorUnit==='weeks'?'Weekly':'Monthly'})),[form.tenorUnit]);

    // Auto coupon currency
    useEffect(()=>{if(form.couponSameAsNotional)setForm(p=>({...p,couponCurrency:p.notionalCurrency}));},[form.couponSameAsNotional,form.notionalCurrency]);

    // Auto-set first underlying pair when notional currency changes
    useEffect(()=>{
        setUnderlyings(prev=>{
            const updated=[...prev];
            if(updated.length>0){
                const base=form.notionalCurrency;
                const quote=isStable(form.couponCurrency)?form.couponCurrency:FCN_STABLE.includes(updated[0].pair.split('/')[1])?updated[0].pair.split('/')[1]:'USDT';
                updated[0]={...updated[0],pair:`${isCrypto(base)?base:updated[0].pair.split('/')[0]}/${quote}`};
            }
            return updated;
        });
    },[form.notionalCurrency,form.couponCurrency]);

    const addUnderlying=()=>setUnderlyings(p=>[...p,defaultUnderlying('BTC')]);
    const removeUnderlying=(i)=>setUnderlyings(p=>p.filter((_,j)=>j!==i));
    const setU=(i,k,v)=>setUnderlyings(p=>p.map((u,j)=>j===i?{...u,[k]:v}:u));
    const setUBool=(i,k,v)=>setUnderlyings(p=>p.map((u,j)=>j===i?{...u,[k]:v}:u));

    const disabledCls='opacity-40 pointer-events-none';

    const handleSave=()=>{
        if(!form.clientName) return alert('Client Name required');
        if(!form.notionalAmount) return alert('Notional Amount required');
        if(!form.couponRate) return alert('Coupon Rate required');
        if(!underlyings.length) return alert('At least one underlying pair required');
        if(underlyings.some(u=>!u.pair||!u.spotRef||!u.strikePrice)) return alert('Each underlying needs pair, spot ref and strike price');
        const id=trade?trade.id:`FCN-${Date.now()}`;
        onSave({...form,id,maturityDate,underlyings,
            upfrontFee:form.upfrontFee||'0.00',
            upfrontFeeUnderlying:fcnFeeUnderlying,
            upfrontAmount:fcnUpfrontAmount.toFixed(isCrypto(fcnFeeUnderlying)?8:2),
            paidSettlements:trade?.paidSettlements||[],createdAt:trade?.createdAt||new Date().toISOString()});
    };

    const notionalDp=isCrypto(form.notionalCurrency)?8:2;
    const sampleTrade={...form,maturityDate,underlyings};
    const couponPreview=maturityDate&&form.notionalAmount&&form.couponRate?calcFCNCoupon(sampleTrade):null;
    const schedPreview=maturityDate?buildFCNSchedule(sampleTrade):[];
    // Upfront fee calculation
    const fcnNotional=parseFloat(form.notionalAmount)||0;
    const fcnUpfrontFee=parseFloat(form.upfrontFee)||0;
    const fcnFeeUnderlying=form.upfrontFeeUnderlying||'USDT';
    const fcnSpotRef=parseFloat(underlyings[0]?.spotRef||0);
    const fcnUpfrontAmount=(()=>{
        if(!fcnNotional||!fcnUpfrontFee) return 0;
        const notionalIsCrypto=isCrypto(form.notionalCurrency); // includes XRP
        const feeIsCrypto=isCrypto(fcnFeeUnderlying);
        if(fcnFeeUnderlying===form.notionalCurrency) return fcnNotional*fcnUpfrontFee/100;
        if(notionalIsCrypto&&!feeIsCrypto) return fcnNotional*fcnSpotRef*fcnUpfrontFee/100;
        if(!notionalIsCrypto&&feeIsCrypto&&fcnSpotRef>0) return (fcnNotional/fcnSpotRef)*fcnUpfrontFee/100;
        return fcnNotional*fcnUpfrontFee/100;
    })();

    return(
        <Modal title={trade?`Edit: ${trade.id}`:'New FCN Trade'} onClose={onClose} wide>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="md:col-span-2"><Field label="Client Name"><Input value={form.clientName} onChange={f('clientName')} placeholder="Client name"/></Field></div>
                <Field label="Trade Date"><Input type="date" value={form.tradeDate} onChange={f('tradeDate')}/></Field>
                <Field label="Tenor">
                    <div className="flex gap-2">
                        <Input type="number" value={form.tenorValue} onChange={f('tenorValue')} min="1" style={{width:'80px'}}/>
                        <Select value={form.tenorUnit} onChange={f('tenorUnit')}><option value="weeks">Weeks</option><option value="months">Months</option></Select>
                    </div>
                </Field>
                <Field label="Maturity Date (auto)"><div className="card-inner px-3 py-2 mono text-cyan-400 text-sm">{maturityDate||'—'}</div></Field>
                <Field label="Settlement Frequency"><div className="card-inner px-3 py-2 text-slate-300 text-sm">{form.settlementFrequency} (from tenor)</div></Field>
                <Field label="Notional Currency">
                    <Select value={form.notionalCurrency} onChange={f('notionalCurrency')}>
                        {FCN_CURRENCIES.map(c=><option key={c}>{c}</option>)}
                    </Select>
                </Field>
                <Field label={`Notional Amount (${notionalDp}dp)`}>
                    <Input type="number" value={form.notionalAmount} onChange={f('notionalAmount')} step={isCrypto(form.notionalCurrency)?'0.00000001':'0.01'}/>
                </Field>
                <div className="md:col-span-2">
                    <div className="flex items-center justify-between mb-1">
                        <label className="text-xs text-slate-400">Coupon Currency</label>
                        <label className="flex items-center gap-1.5 cursor-pointer text-xs text-cyan-400">
                            <input type="checkbox" checked={form.couponSameAsNotional} onChange={fb('couponSameAsNotional')} className="accent-cyan-500"/>
                            Same as Notional
                        </label>
                    </div>
                    <div className={form.couponSameAsNotional?disabledCls:''}>
                        <Select value={form.couponCurrency} onChange={f('couponCurrency')} disabled={form.couponSameAsNotional}>
                            {FCN_CURRENCIES.map(c=><option key={c}>{c}</option>)}
                        </Select>
                    </div>
                </div>
                <Field label="Coupon Rate (% APR)"><Input type="number" value={form.couponRate} onChange={f('couponRate')} step="0.01" placeholder="e.g. 12.00"/></Field>
                {/* Upfront Fee */}
                <Field label="Upfront Fee (% — bookkeeping only)">
                    <Input type="number" value={form.upfrontFee||'0.00'} onChange={f('upfrontFee')} step="0.01" placeholder="0.00"/>
                </Field>
                <Field label="Fee Underlying Currency">
                    <Select value={form.upfrontFeeUnderlying||'USDT'} onChange={f('upfrontFeeUnderlying')}>
                        <option value="BTC">BTC</option><option value="ETH">ETH</option>
                        <option value="USDC">USDC</option><option value="USDT">USDT</option>
                    </Select>
                </Field>
                <Field label="Upfront Amount (auto)" hint={fcnFeeUnderlying!==form.notionalCurrency?`Converted at spot ref $${fmt(fcnSpotRef,2)}`:'Same currency'}>
                    <div className="card-inner px-3 py-2 mono text-slate-300 text-sm">
                        {fcnNotional>0?`${fcnFeeUnderlying} ${fmt(fcnUpfrontAmount,isCrypto(fcnFeeUnderlying)?8:2)}`:'—'}
                    </div>
                </Field>
                {/* KI — Variant A only */}
                {!notionalIsStable&&(
                    <div>
                        <div className="flex items-center justify-between mb-1">
                            <label className="text-xs text-slate-400">Knock-In Price (2dp)</label>
                            <label className="flex items-center gap-1.5 cursor-pointer text-xs text-red-400">
                                <input type="checkbox" checked={form.knockInEnabled} onChange={fb('knockInEnabled')} className="accent-red-500"/>Enable KI
                            </label>
                        </div>
                        <div className={!form.knockInEnabled?disabledCls:''}>
                            <Input type="number" value={form.knockInPrice} onChange={f('knockInPrice')} step="0.01" disabled={!form.knockInEnabled} placeholder={!form.knockInEnabled?'Disabled':'e.g. 50000.00'}/>
                        </div>
                    </div>
                )}
                {trade&&<Field label="Status"><Select value={form.status} onChange={f('status')}><option>Active</option><option>Knocked Out</option><option>Exercised</option><option>Matured</option></Select></Field>}
            </div>

            {/* Underlying Pairs section */}
            <div className="mt-5 border-t border-slate-700 pt-4">
                <div className="flex items-center justify-between mb-3">
                    <p className="text-sm font-semibold text-slate-300">
                        Underlying Pair{underlyings.length>1?'s':''}{notionalIsStable&&underlyings.length>1&&<span className="ml-2 text-xs text-cyan-400 font-normal">Worst-of structure</span>}
                    </p>
                    <button onClick={addUnderlying} className="btn-secondary px-3 py-1 rounded-lg text-xs flex items-center gap-1">
                        <Icon.Plus/> Add Pair
                    </button>
                </div>
                <div className="space-y-3">
                    {underlyings.map((u,i)=>(
                        <div key={i} className="card-inner p-3 space-y-3">
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-medium text-slate-300">Underlying {i+1}</span>
                                {underlyings.length>1&&(
                                    <button onClick={()=>removeUnderlying(i)} className="text-red-400 hover:text-red-300 text-xs">✕ Remove</button>
                                )}
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                <Field label="Pair (e.g. BTC/USDT)">
                                    <Input value={u.pair} onChange={e=>setU(i,'pair',e.target.value)} placeholder="BTC/USDT"/>
                                </Field>
                                <Field label="Spot Reference (2dp)">
                                    <Input type="number" value={u.spotRef} onChange={e=>setU(i,'spotRef',e.target.value)} step="0.01" placeholder="e.g. 71000.00"/>
                                </Field>
                                <Field label="Strike Price (2dp)">
                                    <Input type="number" value={u.strikePrice} onChange={e=>setU(i,'strikePrice',e.target.value)} step="0.01"/>
                                </Field>
                                <div className="md:col-span-3">
                                    <div className="flex items-center justify-between mb-1">
                                        <label className="text-xs text-slate-400">Knock-Out Price (2dp)</label>
                                        <label className="flex items-center gap-1.5 cursor-pointer text-xs text-orange-400">
                                            <input type="checkbox" checked={!!u.koEnabled} onChange={e=>setUBool(i,'koEnabled',e.target.checked)} className="accent-orange-500"/>
                                            {notionalIsStable?'Enable KO (price above triggers KO)':'Enable KO (price below triggers KO)'}
                                        </label>
                                    </div>
                                    <div className={!u.koEnabled?disabledCls:''}>
                                        <Input type="number" value={u.koPrice||''} onChange={e=>setU(i,'koPrice',e.target.value)} step="0.01" disabled={!u.koEnabled} placeholder={!u.koEnabled?'Disabled':'e.g. 80000.00'}/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>

            {/* Preview */}
            {maturityDate&&form.notionalAmount&&form.couponRate&&underlyings[0]?.spotRef&&(
                <div className="mt-4 bg-cyan-900/20 border border-cyan-500/20 rounded-lg p-3 text-xs text-cyan-300 space-y-1">
                    <p className="font-medium">Trade Preview</p>
                    <p>Maturity: {maturityDate} · {form.settlementFrequency} · {schedPreview.length} settlement{schedPreview.length!==1?'s':''}</p>
                    {couponPreview!==null&&<p>Coupon per period: {fmtFCNCompact(couponPreview,form.couponCurrency)} {form.couponCurrency}</p>}
                    {notionalIsStable&&underlyings.length>1&&<p className="text-amber-300">⚠ Worst-of: {underlyings.length} underlyings — KO/Strike checked on ALL pairs</p>}
                </div>
            )}

            <div className="flex gap-2 mt-5">
                <button onClick={handleSave} className="btn-primary flex-1 px-4 py-2 rounded-lg font-semibold text-sm">{trade?'Update Trade':'Create Trade'}</button>
                <button onClick={onClose} className="btn-secondary px-4 py-2 rounded-lg text-sm">Cancel</button>
            </div>
        </Modal>
    );
};

// ─── FCN MODULE ───────────────────────────────────────────────────────────────
const FCNModule = ({prices}) => {
    const [trades,setTrades]=useState(()=>{try{return JSON.parse(localStorage.getItem('cpb_fcn_trades')||'[]');}catch{return[];}});
    const [config,setConfig]=useState(()=>{try{return JSON.parse(localStorage.getItem('cpb_fcn_config')||'{}');}catch{return{};}});
    const [showAdd,setShowAdd]=useState(false);
    const [editingTrade,setEditingTrade]=useState(null);
    const [showSettings,setShowSettings]=useState(false);
    const [filterStatus,setFilterStatus]=useState('all');
    const [sheetsLoading,setSheetsLoading]=useState(false);

    useEffect(()=>{localStorage.setItem('cpb_fcn_trades',JSON.stringify(trades));},[trades]);
    useEffect(()=>{localStorage.setItem('cpb_fcn_config',JSON.stringify(config));},[config]);
    // Auto-sync from Sheets on load and every 30 seconds — picks up trades added by other users
    useEffect(()=>{ if(config.scriptUrl){fetchFromSheets();const t=setInterval(fetchFromSheets,30000);return()=>clearInterval(t);} },[config.scriptUrl]);

    // Barrier check at 4pm SGT on settlement dates
    useEffect(()=>{
        const nowSGT=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Singapore'}));
        if(nowSGT.getHours()<16) return;
        const todayStr=todayUTC();
        setTrades(prev=>prev.map(trade=>{
            if(trade.status!=='Active') return trade;
            const sched=buildFCNSchedule(trade);
            const isSettlementToday=sched.some(s=>s.date===todayStr);
            const isMaturityToday=sched.some(s=>s.date===todayStr&&s.isMaturity);
            return checkBarriers(trade,prices,todayStr,isSettlementToday,isMaturityToday);
        }));
    },[prices]);

    const pushTrade=async(trade)=>{
        if(!config.scriptUrl) return;
        try {
            await fcnSheetsCall(config.scriptUrl,{action:'upsertFCNOrder',values:JSON.stringify(tradToRow(trade))});
        } catch(e){console.error('FCN push failed:',e.message);}
    };

    const addTrade=async(t)=>{ const trade={...t,createdAt:new Date().toISOString()}; setTrades(p=>[...p,trade]); setShowAdd(false); await pushTrade(trade); };
    const updateTrade=async(t)=>{ setTrades(p=>p.map(x=>x.id===t.id?t:x)); setEditingTrade(null); await pushTrade(t); };
    const deleteTrade=(id)=>{ if(confirm('Delete this FCN trade?')) setTrades(p=>p.filter(t=>t.id!==id)); };
    const confirmPayment=async(tradeId,date)=>{
        // Compute everything from current trades state BEFORE calling setTrades —
        // same fix as Accumulator: setTrades updater runs asynchronously so
        // variables set inside it are not available in the code that follows.
        const trade=trades.find(t=>t.id===tradeId);
        if(!trade) return;

        // Build updated trade
        const paid=[...(trade.paidSettlements||[])];
        if(!paid.includes(date)) paid.push(date);
        const updatedTrade={...trade,paidSettlements:paid};

        // Build settlement log entry synchronously
        const sched=buildFCNSchedule(trade);
        const settlementEntry=sched.find(s=>s.date===date);
        const isMaturity=settlementEntry?.isMaturity||false;
        const coupon=calcFCNCoupon(trade);
        const underlyingPairs=(trade.underlyings||[]).map(u=>u.pair).join(', ');
        let maturityType='—', notionalReturned=0;
        if(isMaturity){
            if(trade.status==='Exercised'){
                maturityType=`Exercised — worst-of ${trade.worstOffPair||'N/A'} @ ${trade.worstOffStrike||'N/A'}`;
                notionalReturned=0;
            } else if(trade.status==='Knocked Out'){
                maturityType='Knocked Out — notional returned';
                notionalReturned=parseFloat(trade.notionalAmount)||0;
            } else {
                maturityType='Matured — notional returned';
                notionalReturned=parseFloat(trade.notionalAmount)||0;
            }
        }
        const logEntry={
            tradeId:trade.id, clientName:trade.clientName,
            settlementDate:date, confirmedAt:new Date().toISOString(),
            type:isMaturity?'MATURITY':'COUPON',
            couponAmount:coupon.toFixed(isCrypto(trade.couponCurrency)?8:2),
            couponCcy:trade.couponCurrency,
            notionalReturned:notionalReturned.toFixed(isCrypto(trade.notionalCurrency)?8:2),
            notionalCcy:trade.notionalCurrency,
            maturityType,
            underlyingPairs,
            kiTriggered:trade.knockInTriggered?'YES':'NO',
            tradeStatus:trade.status,
        };

        // Update state and push trade
        setTrades(prev=>prev.map(t=>t.id===tradeId?updatedTrade:t));
        pushTrade(updatedTrade);

        // Log to FCN_Settlements sheet — guaranteed non-null now
        if(config.scriptUrl){
            try{
                await fcnSheetsCall(config.scriptUrl,{
                    action:'logFCNSettlement',
                    values:JSON.stringify([
                        logEntry.tradeId, logEntry.clientName,
                        logEntry.settlementDate, logEntry.confirmedAt,
                        logEntry.type, logEntry.couponAmount, logEntry.couponCcy,
                        logEntry.notionalReturned, logEntry.notionalCcy,
                        logEntry.maturityType, logEntry.underlyingPairs,
                        logEntry.kiTriggered, logEntry.tradeStatus,
                    ])
                });
            } catch(e){console.error('FCN settlement log failed:',e.message);}
        }
    };

    const fetchFromSheets=async()=>{
        if(!config.scriptUrl) return;
        setSheetsLoading(true);
        try {
            const res=await fcnSheetsCall(config.scriptUrl,{action:'readFCNOrders'});
            if(res.values&&res.values.length) setTrades(res.values.filter(r=>r[0]&&r[1]).map(rowToTrade));
        } catch(e){alert('FCN sync error: '+e.message);}
        setSheetsLoading(false);
    };

    const filtered=trades.filter(t=>{
        if(filterStatus==='all') return true;
        if(filterStatus==='active') return t.status==='Active';
        if(filterStatus==='knocked-out') return t.status==='Knocked Out';
        if(filterStatus==='exercised') return t.status==='Exercised';
        if(filterStatus==='matured') return t.status==='Matured';
        return true;
    });

    return(
        <div>
            <FCNDashboard trades={trades} prices={prices} onConfirmPayment={confirmPayment}/>
            <div className="flex flex-wrap gap-2 mb-5 justify-between items-center">
                <div className="flex gap-2 flex-wrap">
                    <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="w-auto text-xs px-2 py-1.5">
                        <option value="all">All</option><option value="active">Active</option>
                        <option value="knocked-out">Knocked Out</option><option value="exercised">Exercised</option><option value="matured">Matured</option>
                    </Select>
                    {config.scriptUrl&&<button onClick={fetchFromSheets} disabled={sheetsLoading} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5"><Icon.Refresh spin={sheetsLoading}/> Sync Sheets</button>}
                    <button onClick={()=>setShowSettings(!showSettings)} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5"><Icon.Settings/> Config</button>
                </div>
                <button onClick={()=>setShowAdd(true)} className="btn-primary px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><Icon.Plus/> New FCN Trade</button>
            </div>
            {showSettings&&(
                <div className="card p-5 mb-5">
                    <h3 className="font-semibold mb-3 text-sm">Google Sheets Config — FCN</h3>
                    <p className="text-xs text-slate-500 mb-3">Separate spreadsheet from Loans and SSPS.</p>
                    <Field label="FCN Apps Script URL"><Input value={config.scriptUrl||''} onChange={e=>setConfig(p=>({...p,scriptUrl:e.target.value}))} placeholder="https://script.google.com/macros/s/.../exec"/></Field>
                    <div className="flex gap-2 mt-3">
                        <button onClick={()=>{localStorage.setItem('cpb_fcn_config',JSON.stringify(config));setShowSettings(false);if(config.scriptUrl)fetchFromSheets();}} className="btn-primary px-4 py-2 rounded-lg text-sm">Save & Connect</button>
                        <button onClick={()=>setShowSettings(false)} className="btn-secondary px-4 py-2 rounded-lg text-sm">Cancel</button>
                    </div>
                </div>
            )}
            {filtered.length===0
                ?<div className="card p-12 text-center"><p className="text-slate-400">No FCN trades found.</p></div>
                :<div className="space-y-3">{filtered.map(t=><FCNOrderCard key={t.id} trade={t} prices={prices} onEdit={setEditingTrade} onDelete={deleteTrade}/>)}</div>
            }
            {showAdd&&<FCNFormModal onSave={addTrade} onClose={()=>setShowAdd(false)}/>}
            {editingTrade&&<FCNFormModal trade={editingTrade} onSave={updateTrade} onClose={()=>setEditingTrade(null)}/>}
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════════
// ACCUMULATOR MODULE
// ═══════════════════════════════════════════════════════════════════════════════

// ─── HELPERS ──────────────────────────────────────────────────────────────────

const ACC_UNDERLYING_SYMBOLS = { 'BTC/USDT':'BTCUSDT','BTC/USDC':'BTCUSDC','ETH/USDT':'ETHUSDT','ETH/USDC':'ETHUSDC','ADA/USDT':'ADAUSDT','ADA/USDC':'ADAUSDC','XRP/USDT':'XRPUSDT','XRP/USDC':'XRPUSDC' };
const ACC_PAIRS = Object.keys(ACC_UNDERLYING_SYMBOLS);
const accBaseAsset = (pair) => (pair||'').split('/')[0]; // BTC/USDT → BTC

// Build settlement schedule for an accumulator
const buildAccSchedule = (trade) => {
    if (!trade.tradeDate || !trade.maturityDate) return [];
    const dates = [];
    let current = new Date(trade.tradeDate + 'T00:00:00Z');
    const maturity = new Date(trade.maturityDate + 'T00:00:00Z');
    const isWeekly = trade.tenorUnit === 'weeks';
    while (true) {
        if (isWeekly) current = new Date(current.getTime() + 7*86400000);
        else { const d = new Date(current); d.setUTCMonth(d.getUTCMonth()+1); current=d; }
        if (current > maturity) break;
        dates.push(current.toISOString().split('T')[0]);
    }
    return dates;
};

// Check if fixing triggers KO (price >= KO price)
const accIsKO = (trade, fixingPrice) =>
    trade.knockOutEnabled && fixingPrice >= parseFloat(trade.knockOutPrice);

// Determine base settlement scenario for a fixing.
// Returns: 'above' | 'inzone' | 'below'
// KO is a separate modifier checked via accIsKO — it does not change the settlement scenario.
const accScenario = (trade, fixingPrice) => {
    const strike = parseFloat(trade.strikePrice);
    const buf    = trade.bufferEnabled ? parseFloat(trade.bufferPrice) : null;
    if (buf !== null) {
        const zoneMin = Math.min(strike, buf);
        const zoneMax = Math.max(strike, buf);
        if (fixingPrice >= zoneMax) return 'above';
        if (fixingPrice >= zoneMin && fixingPrice < zoneMax) return 'inzone';
        return 'below';
    }
    return fixingPrice >= strike ? 'above' : 'below';
};

// Truncation helpers — never round up financial amounts
const trunc2 = (n) => Math.floor(n * 100) / 100;
const trunc8 = (n) => Math.floor(n * 1e8) / 1e8;

// Calculate amounts for a given scenario.
// confirmedCount = number of periods already confirmed BEFORE this one.
// isKO = true if this fixing also triggers a knockout.
// When isKO: remaining balance = notional - (confirmedCount+1)*amount2 is added to base returned.
// If base returned and remaining are the same currency (always USDT/USDC here) they are combined.
const accAmounts = (trade, scenario, confirmedCount=0, isKO=false) => {
    const notional    = parseFloat(trade.notionalAmount) || 0;
    const periods     = parseInt(trade.tenorValue) || 1;
    const amount2     = trunc2(notional / periods);
    const amount1     = trunc2(amount2 / 2);
    const strike      = parseFloat(trade.strikePrice);
    const base        = accBaseAsset(trade.underlyingPair);
    const notionalCcy = trade.notionalCurrency;
    // Remaining balance returned on KO = notional minus all periods including this one
    const remaining   = isKO ? Math.max(0, notional - (confirmedCount + 1) * amount2) : 0;

    switch (scenario) {
        case 'above':
            return {
                cryptoQty:  trunc8(amount1 / strike),
                cryptoCcy:  base,
                // Amount1 base + remaining combined (same currency)
                baseAmount: isKO ? trunc2(amount1 + remaining) : amount1,
                baseCcy:    notionalCcy,
                label: isKO ? 'KO: Amount 1 crypto + Amount 1 + remaining returned' : 'Amount 1 crypto + Amount 1 base returned',
                totalUsed:  amount2,
                isKO,
                remaining,
            };
        case 'inzone':
            return {
                cryptoQty:  0,
                cryptoCcy:  base,
                // Amount2 base + remaining combined (same currency)
                baseAmount: isKO ? trunc2(amount2 + remaining) : amount2,
                baseCcy:    notionalCcy,
                label: isKO ? 'KO: In zone — Amount 2 + remaining returned' : 'In zone — Amount 2 base returned',
                totalUsed:  amount2,
                isKO,
                remaining,
            };
        case 'below':
            return {
                cryptoQty:  trunc8(amount2 / strike),
                cryptoCcy:  base,
                // Crypto delivery separate, remaining base returned separately
                baseAmount: isKO ? remaining : 0,
                baseCcy:    notionalCcy,
                label: isKO ? 'KO: Amount 2 crypto + remaining base returned' : 'Amount 2 crypto purchased at strike',
                totalUsed:  amount2,
                isKO,
                remaining,
            };
        default: return { cryptoQty:0, baseAmount:0, totalUsed:0, label:'—', isKO:false, remaining:0 };
    }
};

const ACC_KO_STYLE = { bg:'bg-orange-900/20', border:'border-orange-500/30', text:'text-orange-400' };

const ACC_STATUS_BADGE = {

    'Matured':     'bg-blue-500/15 text-blue-400 border-blue-500/30',

// Sheets call
const accSheetsCall = async (url, payload) => {
    const qs = Object.entries(payload).map(([k,v])=>`${k}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`).join('&');
    const res = await fetch(`${url}?${qs}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error||'Accumulator Sheets error');
    return data;
};

// ─── ACCUMULATOR DASHBOARD ────────────────────────────────────────────────────
const AccumulatorDashboard = ({trades, prices, onConfirmFixing, onFetchPrice}) => {
    const today = todayUTC();
    const in7 = new Date(new Date().getTime()+7*86400000).toISOString().split('T')[0];
    const activeTrades = trades.filter(t=>t.status==='Active');

    // Portfolio totals — remaining notional per currency
    const portfolioTotals = {};
    activeTrades.forEach(t => {
        const sched = buildAccSchedule(t);
        const confirmedCount = (t.fixings||[]).filter(f=>f.confirmed).length;
        const amount2dash = trunc2((parseFloat(t.notionalAmount)||0) / (parseInt(t.tenorValue)||1));
        const remaining = Math.max(0, parseFloat(t.notionalAmount) - confirmedCount * amount2dash);
        const ccy = t.notionalCurrency;
        if (!portfolioTotals[ccy]) portfolioTotals[ccy] = {original:0, remaining:0};
        portfolioTotals[ccy].original  += parseFloat(t.notionalAmount);
        portfolioTotals[ccy].remaining += remaining;
    });

    // Build overdue (past 30 days, unconfirmed) and upcoming (next 7 days) lists
    const past30 = new Date(new Date().getTime() - 30*86400000).toISOString().split('T')[0];
    const overdue = [], upcoming = [];
    trades.forEach(trade => {
        if (!['Active','Knocked Out'].includes(trade.status)) return;
        const sched = buildAccSchedule(trade);
        const amount2up = trunc2((parseFloat(trade.notionalAmount)||0) / (parseInt(trade.tenorValue)||1));
        sched.forEach(date => {
            const existing = (trade.fixings||[]).find(f=>f.date===date);
            if (existing?.confirmed) return;
            const confirmedBefore = (trade.fixings||[]).filter(f=>f.confirmed&&f.date<date).length;
            const remaining = Math.max(0, parseFloat(trade.notionalAmount) - confirmedBefore * amount2up);
            const entry = {trade, date, existing, remaining, weekend:isWeekend(date)};
            if (date < today && date >= past30) overdue.push(entry);
            else if (date >= today && date <= in7) upcoming.push(entry);
        });
    });
    overdue.sort((a,b)=>b.date.localeCompare(a.date)); // newest first for overdue
    upcoming.sort((a,b)=>a.date.localeCompare(b.date));

    return (
        <div className="mb-6">
            <div className="flex items-center justify-between mb-3">
                <h2 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-violet-400 inline-block"/>
                    Accumulator Dashboard
                </h2>
            </div>

            {/* Portfolio summary */}
            {Object.keys(portfolioTotals).length > 0 && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    {Object.entries(portfolioTotals).map(([ccy,{original,remaining}])=>(
                        <div key={ccy} className="card p-4">
                            <p className="text-xs text-slate-400 mb-1 font-medium">Active Notional — {ccy}</p>
                            <p className="text-xl font-bold mono text-white">{ccy} {fmt(remaining,2)}</p>
                            <div className="mt-2 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-violet-500 rounded-full" style={{width:`${Math.min(100,(remaining/original)*100)}%`}}/>
                            </div>
                            <p className="text-xs text-slate-500 mt-1">{fmt((remaining/original)*100,1)}% remaining of {ccy} {fmt(original,2)} original · {activeTrades.filter(t=>t.notionalCurrency===ccy).length} trade(s)</p>
                        </div>
                    ))}
                </div>
            )}

            {/* Settlements table renderer — shared by overdue and upcoming */}
            {(()=>{
                const nowSGT = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Singapore'}));
                const renderRow = (s, i, isPast) => {
                    const f = s.existing;
                    // Past rows: price is locked (no live indicative)
                    // Today before 4pm: use live indicative
                    // Today after 4pm / future: locked if price entered, else live
                    const isToday = s.date === todayUTC();
                    const pastFixingTime = isToday && nowSGT.getHours() >= 16;
                    const priceForScenario = f?.fixingPrice
                        ? parseFloat(f.fixingPrice)
                        : (isPast || pastFixingTime) ? null
                        : (prices[accBaseAsset(s.trade.underlyingPair)] || null);
                    const isIndicative = !f?.fixingPrice && priceForScenario !== null;
                    const scenario = priceForScenario !== null ? accScenario(s.trade, priceForScenario) : null;
                    const isKO = priceForScenario !== null ? accIsKO(s.trade, priceForScenario) : false;
                    const confirmedBefore = (s.trade.fixings||[]).filter(f=>f.confirmed&&f.date<s.date).length;
                    const amounts = scenario ? accAmounts(s.trade, scenario, confirmedBefore, isKO) : null;
                    const ss = scenario ? ACC_SCENARIO_STYLE[scenario] : null;
                    const rowBg = isPast
                        ? 'bg-amber-900/15 border-amber-800/30'
                        : isKO ? 'bg-orange-900/10' : s.weekend ? 'bg-amber-900/10' : '';
                    return (
                        <tr key={i} className={`border-b border-slate-800/50 ${rowBg}`}>
                            <td className="px-3 py-2.5 font-medium text-slate-200">
                                {s.trade.clientName}
                                {isPast&&<span className="ml-1.5 px-1 py-0.5 bg-amber-900/40 text-amber-400 rounded text-[9px]">OVERDUE</span>}
                            </td>
                            <td className="px-3 py-2.5 mono text-slate-400">{s.trade.underlyingPair}</td>
                            <td className={`px-3 py-2.5 mono ${isPast?'text-amber-400':s.weekend?'text-amber-400':'text-slate-300'}`}>
                                {s.date}{s.weekend&&<span className="ml-1 text-[10px] text-amber-500">WE</span>}
                            </td>
                            <td className="px-3 py-2.5 text-slate-400">{dayName(s.date)}</td>
                            <td className="px-3 py-2.5 mono">
                                {f?.fixingPrice
                                    ? <span className="text-white">${fmt(parseFloat(f.fixingPrice),2)}</span>
                                    : isIndicative
                                        ? <span className="text-slate-400">${fmt(priceForScenario,2)} <span className="text-slate-600 text-[9px]">live</span></span>
                                        : <span className="text-red-400/70 text-[10px]">price needed</span>}
                            </td>
                            <td className="px-3 py-2.5">
                                {ss&&<span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${ss.bg} ${ss.text}`}>{ss.label}{isIndicative&&<span className="ml-0.5 opacity-60">~</span>}</span>}
                                {isKO&&<span className="ml-1 px-1.5 py-0.5 rounded text-[10px] font-medium bg-orange-900/40 text-orange-400">KO</span>}
                                {!ss&&<span className="text-slate-600">—</span>}
                            </td>
                            <td className="px-3 py-2.5 mono text-cyan-400">
                                {amounts?.cryptoQty>0
                                    ? <span>{trunc8(amounts.cryptoQty).toFixed(8)} {amounts.cryptoCcy}{isIndicative&&<span className="text-slate-600 text-[9px] ml-0.5">~</span>}</span>
                                    : '—'}
                            </td>
                            <td className="px-3 py-2.5 mono text-yellow-400">
                                {amounts?.baseAmount>0
                                    ? <span>{s.trade.notionalCurrency} {fmt(amounts.baseAmount,2)}{isKO&&!isIndicative&&<span className="text-orange-400/70 text-[9px] ml-1">incl. remaining</span>}{isIndicative&&<span className="text-slate-600 text-[9px] ml-0.5">~</span>}</span>
                                    : '—'}
                            </td>
                            <td className="px-3 py-2.5 mono text-orange-400">
                                {s.trade.knockOutEnabled?`$${fmt(parseFloat(s.trade.knockOutPrice),2)}`:'—'}
                            </td>
                            <td className="px-3 py-2.5 mono text-purple-400">${fmt(parseFloat(s.trade.strikePrice),2)}</td>
                            <td className="px-3 py-2.5 mono text-slate-300">{s.trade.notionalCurrency} {fmt(s.remaining,2)}</td>
                            <td className="px-3 py-2.5">
                                <div className="flex gap-1 flex-wrap">
                                    {!f?.fixingPrice&&isPast&&(
                                        <button onClick={()=>onFetchPrice(s.trade.id,s.date,s.trade.underlyingPair)}
                                            className="px-2 py-1 bg-cyan-900/30 hover:bg-cyan-900/50 border border-cyan-500/30 rounded text-cyan-400 text-[10px] transition-colors flex items-center gap-1">
                                            ↻ Fetch
                                        </button>
                                    )}
                                    <button onClick={()=>onConfirmFixing(s.trade.id, s.date)}
                                        className={`px-2 py-1 border rounded text-[10px] transition-colors whitespace-nowrap ${isPast?'bg-amber-600/20 hover:bg-amber-600/40 border-amber-500/30 text-amber-400':'bg-green-600/20 hover:bg-green-600/40 border-green-500/30 text-green-400'}`}>
                                        ✓ Confirm
                                    </button>
                                </div>
                            </td>
                        </tr>
                    );
                };
                const headers = ['Client','Underlying','Date','Day','Fixing Price','Scenario','Crypto Delivery','Base Returned','KO Price','Strike','Remaining','Action'];
                const thead = (<thead><tr className="border-b border-slate-800 bg-slate-900/40">{headers.map(h=>(<th key={h} className="text-left px-3 py-2.5 text-slate-400 font-medium whitespace-nowrap">{h}</th>))}</tr></thead>);
                return (<>
                    {/* Overdue settlements */}
                    {overdue.length>0&&(
                        <div className="card overflow-hidden mb-3">
                            <div className="px-4 py-3 border-b border-amber-800/30 bg-amber-900/10 flex items-center justify-between">
                                <p className="text-sm font-semibold text-amber-400 flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-amber-400 inline-block animate-pulse"/>
                                    Overdue Settlements (Last 30 Days)
                                </p>
                                <span className="text-xs text-amber-500/70">{overdue.length} unconfirmed</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">{thead}<tbody>{overdue.map((s,i)=>renderRow(s,i,true))}</tbody></table>
                            </div>
                        </div>
                    )}
                    {/* Upcoming settlements */}
                    {upcoming.length>0?(
                        <div className="card overflow-hidden">
                            <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
                                <p className="text-sm font-semibold text-slate-300">Settlements Due (Next 7 Days)</p>
                                <span className="text-xs text-slate-500">{upcoming.length} pending</span>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">{thead}<tbody>{upcoming.map((s,i)=>renderRow(s,i,false))}</tbody></table>
                            </div>
                        </div>
                    ):(
                        <div className="card p-6 text-center text-slate-500 text-sm">No settlements due in the next 7 days.</div>
                    )}
                </>);
            })()}
        </div>
    );
};

    const fixings     = trade.fixings || [];
    const confirmed   = fixings.filter(f=>f.confirmed);
    // Recompute with truncation so display is always correct even for older trades
    const amount2     = trunc2((parseFloat(trade.notionalAmount)||0) / (parseInt(trade.tenorValue)||1));
    const amount1     = trunc2(amount2 / 2);
