                                        <td className="py-2 pr-3 mono text-cyan-400">
                                            {amounts?.cryptoQty > 0 ? `${trunc8(amounts.cryptoQty).toFixed(8)} ${amounts.cryptoCcy}` : '—'}
                                        </td>
                                        <td className="py-2 pr-3 mono text-yellow-400">
                                            {amounts?.baseAmount > 0 ? `${trade.notionalCurrency} ${fmt(amounts.baseAmount,2)}` : isKO ? `${trade.notionalCurrency} ${fmt(notionalAfter,2)}` : '—'}
                                        </td>
                                        <td className="py-2 pr-3 mono text-slate-400">
                                            {isConf ? `${trade.notionalCurrency} ${fmt(notionalAfter,2)}` : '—'}
                                        </td>
                                        <td className="py-2 pr-3">
                                            {isConf ? <span className="text-green-400">✓ Confirmed</span>
                                                : isPast ? <span className="text-red-400">Pending</span>
                                                : <span className="text-slate-500">Upcoming</span>}
                                        </td>
                                        <td className="py-2 flex gap-1.5">
                                            {!isConf && !isFuture && (
                                                <>
                                                    <button onClick={()=>fetchFixing(date)} disabled={!!fetchingDate}
                                                        className="px-2 py-0.5 bg-cyan-900/30 border border-cyan-500/30 rounded text-cyan-400 text-[10px] hover:bg-cyan-900/50 flex items-center gap-1">
                                                        <Icon.Refresh spin={fetchingDate===date}/> Fetch
                                                    </button>
                                                    <button onClick={()=>{setManualDate(date);setManualPrice(fp?fp.toFixed(2):'');}}
                                                        className="px-2 py-0.5 bg-slate-700 border border-slate-600 rounded text-slate-300 text-[10px] hover:bg-slate-600">
                                                        Enter
                                                    </button>
                                                    {fp !== null && (
                                                        <button onClick={()=>onConfirmFixing(trade.id, date)}
                                                            className="px-2 py-0.5 bg-green-900/30 border border-green-500/30 rounded text-green-400 text-[10px] hover:bg-green-900/50">
                                                            ✓
                                                        </button>
                                                    )}
                                                </>
                                            )}
                                            {isFuture && livePrice > 0 && (
                                                <span className={`text-[10px] mono ${accScenario(trade,livePrice)==='knockout'?'text-orange-400':accScenario(trade,livePrice)==='above'?'text-green-400':accScenario(trade,livePrice)==='inzone'?'text-blue-400':'text-red-400'}`}>
                                                    live: ${fmt(livePrice,0)} → {ACC_SCENARIO_STYLE[accScenario(trade,livePrice)]?.label}
                                                </span>
                                            )}
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};

// ─── ACCUMULATOR FORM MODAL ───────────────────────────────────────────────────
const AccumulatorFormModal = ({trade, onSave, onClose}) => {
    const [form, setForm] = useState(trade || {
        clientName:'', tradeDate:todayLocal(), tenorValue:52, tenorUnit:'weeks',
        notionalCurrency:'USDT', notionalAmount:'',
        underlyingPair:'BTC/USDT', spotReferencePrice:'',
        strikePrice:'', knockOutEnabled:false, knockOutPrice:'',
        bufferEnabled:false, bufferPrice:'',
        upfrontFee:'0.00', upfrontFeeUnderlying:'USDT', status:'Active',
    });
    const f  = k => e => setForm(p=>({...p,[k]:e.target.value}));
    const fb = k => e => setForm(p=>({...p,[k]:e.target.checked}));

    // Auto maturity
    const computeMaturity = () => {
        if (!form.tradeDate || !form.tenorValue) return '';
        const start = new Date(form.tradeDate+'T00:00:00Z');
        const val = parseInt(form.tenorValue)||0;
        if (form.tenorUnit==='weeks') return new Date(start.getTime()+val*7*86400000).toISOString().split('T')[0];
        const d = new Date(start); d.setUTCMonth(d.getUTCMonth()+val); return d.toISOString().split('T')[0];
    };
    const maturityDate = computeMaturity();

    // Auto-calculate amounts
    const periods = parseInt(form.tenorValue)||1;
    const notional = parseFloat(form.notionalAmount)||0;
    const amount2 = notional > 0 ? (notional / periods) : 0;
    const amount1 = amount2 / 2;

    // Auto-calculate upfront amount based on fee underlying
    const upfrontFee = parseFloat(form.upfrontFee)||0;
    const spotRef = parseFloat(form.spotReferencePrice)||0;
    const feeUnderlying = form.upfrontFeeUnderlying || form.notionalCurrency;
    const upfrontAmount = (() => {
        if (!notional || !upfrontFee) return 0;
        const notionalIsCrypto = ['BTC','ETH','ADA','XRP'].includes(form.notionalCurrency);
        const feeIsCrypto = ['BTC','ETH','ADA','XRP'].includes(feeUnderlying);
        // Same currency — straightforward
        if (feeUnderlying === form.notionalCurrency) return notional * upfrontFee / 100;
        // Notional is crypto, fee in stablecoin → multiply by spot ref
        if (notionalIsCrypto && !feeIsCrypto) return notional * spotRef * upfrontFee / 100;
        // Notional is stablecoin, fee in crypto → divide by spot ref
        if (!notionalIsCrypto && feeIsCrypto && spotRef > 0) return (notional / spotRef) * upfrontFee / 100;
        return notional * upfrontFee / 100;
    })();

    const disabledCls = 'opacity-40 pointer-events-none';

    const handleSave = () => {
        if (!form.clientName) return alert('Client Name required');
        if (!form.notionalAmount) return alert('Notional Amount required');
        if (!form.strikePrice) return alert('Strike Price required');
        if (!form.spotReferencePrice) return alert('Spot Reference Price required');
        if (form.knockOutEnabled && !form.knockOutPrice) return alert('KO Price required when KO is enabled');
        if (form.bufferEnabled && !form.bufferPrice) return alert('Buffer Price required when Buffer is enabled');
        const id = trade ? trade.id : `ACC-${Date.now()}`;
        onSave({
            ...form, id, maturityDate,
            amount1: trunc2(amount1).toFixed(2),
            amount2: trunc2(amount2).toFixed(2),
            upfrontAmount: upfrontAmount.toFixed(2),
            upfrontFeeUnderlying: feeUnderlying,
            fixings: trade?.fixings || [],
            createdAt: trade?.createdAt || new Date().toISOString(),
        });
    };

    const schedPreview = maturityDate ? buildAccSchedule({...form,maturityDate}).length : 0;

    return (
        <Modal title={trade?`Edit: ${trade.id}`:'New Accumulator Trade'} onClose={onClose} wide>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className="md:col-span-2">
                    <Field label="Client Name"><Input value={form.clientName} onChange={f('clientName')} placeholder="Client name"/></Field>
                </div>
                <Field label="Trade Date"><Input type="date" value={form.tradeDate} onChange={f('tradeDate')}/></Field>
                <Field label="Tenor">
                    <div className="flex gap-2">
                        <Input type="number" value={form.tenorValue} onChange={f('tenorValue')} min="1" style={{width:'80px'}}/>
                        <Select value={form.tenorUnit} onChange={f('tenorUnit')}>
                            <option value="weeks">Weeks</option>
                            <option value="months">Months</option>
                        </Select>
                    </div>
                </Field>
                <Field label="Maturity Date (auto)">
                    <div className="card-inner px-3 py-2 mono text-cyan-400 text-sm">{maturityDate||'—'}</div>
                </Field>
                <Field label="Settlement Frequency">
                    <div className="card-inner px-3 py-2 text-slate-300 text-sm">{form.tenorUnit==='weeks'?'Weekly':'Monthly'} (from tenor)</div>
                </Field>
                <Field label="Notional Currency">
                    <Select value={form.notionalCurrency} onChange={f('notionalCurrency')}>
                        <option>USDT</option><option>USDC</option>
                    </Select>
                </Field>
                <Field label="Notional Amount (2dp)">
                    <Input type="number" value={form.notionalAmount} onChange={f('notionalAmount')} step="0.01"/>
                </Field>
                <Field label="Underlying Pair">
                    <Select value={form.underlyingPair} onChange={f('underlyingPair')}>
                        {ACC_PAIRS.map(p=><option key={p}>{p}</option>)}
                    </Select>
                </Field>
                <Field label="Spot Reference Price (2dp)">
                    <Input type="number" value={form.spotReferencePrice} onChange={f('spotReferencePrice')} step="0.01" placeholder="e.g. 56000.00"/>
                </Field>
                <Field label="Strike Price (2dp)">
                    <Input type="number" value={form.strikePrice} onChange={f('strikePrice')} step="0.01"/>
                </Field>

                {/* Knock-Out */}
                <div>
                    <div className="flex items-center justify-between mb-1">
                        <label className="text-xs text-slate-400">Knock-Out Price (2dp)</label>
                        <label className="flex items-center gap-1.5 cursor-pointer text-xs text-orange-400">
                            <input type="checkbox" checked={form.knockOutEnabled} onChange={fb('knockOutEnabled')} className="accent-orange-500"/>Enable KO
                        </label>
                    </div>
                    <div className={!form.knockOutEnabled?disabledCls:''}>
                        <Input type="number" value={form.knockOutPrice} onChange={f('knockOutPrice')} step="0.01" disabled={!form.knockOutEnabled} placeholder={!form.knockOutEnabled?'Disabled':'e.g. 84000.00'}/>
                    </div>
                </div>

                {/* Buffer */}
                <div>
                    <div className="flex items-center justify-between mb-1">
                        <label className="text-xs text-slate-400">Buffer Price (2dp)</label>
                        <label className="flex items-center gap-1.5 cursor-pointer text-xs text-blue-400">
                            <input type="checkbox" checked={form.bufferEnabled} onChange={fb('bufferEnabled')} className="accent-blue-500"/>Enable Buffer
                        </label>
                    </div>
                    <div className={!form.bufferEnabled?disabledCls:''}>
                        <Input type="number" value={form.bufferPrice} onChange={f('bufferPrice')} step="0.01" disabled={!form.bufferEnabled} placeholder={!form.bufferEnabled?'Disabled':'e.g. 50000.00'}/>
                    </div>
                </div>

                {/* Upfront Fee */}
                <Field label="Upfront Fee (% — bookkeeping only)">
                    <Input type="number" value={form.upfrontFee} onChange={f('upfrontFee')} step="0.01" placeholder="0.00"/>
                </Field>
                <Field label="Fee Underlying Currency">
                    <Select value={form.upfrontFeeUnderlying||form.notionalCurrency} onChange={f('upfrontFeeUnderlying')}>
                        <option value="BTC">BTC</option>
                        <option value="ETH">ETH</option>
                        <option value="USDC">USDC</option>
                        <option value="USDT">USDT</option>
                    </Select>
                </Field>
                <Field label="Upfront Amount (auto)" hint={feeUnderlying!==form.notionalCurrency?`Converted at spot ref $${fmt(spotRef,2)}`:'Same currency'}>
                    <div className="card-inner px-3 py-2 mono text-slate-300 text-sm">
                        {notional > 0 ? `${feeUnderlying} ${fmt(upfrontAmount,2)}` : '—'}
                    </div>
                </Field>

                {trade && (
                    <Field label="Status">
                        <Select value={form.status} onChange={f('status')}>
                            <option>Active</option><option>Knocked Out</option><option>Matured</option>
                        </Select>
                    </Field>
                )}
            </div>

            {/* Auto-calculated amounts preview */}
            {notional > 0 && periods > 0 && (
                <div className="mt-4 grid grid-cols-2 gap-3">
                    <div className="bg-cyan-900/20 border border-cyan-500/20 rounded-lg p-3 text-xs">
                        <p className="text-slate-400 mb-1">{form.tenorUnit==='weeks'?'Weekly':'Monthly'} Amount 2 (auto)</p>
                        <p className="text-white font-bold mono text-sm">{form.notionalCurrency} {fmt(amount2,2)}</p>
                        <p className="text-slate-500">{form.notionalCurrency} {fmt(notional,2)} ÷ {periods} periods</p>
                    </div>
                    <div className="bg-green-900/20 border border-green-500/20 rounded-lg p-3 text-xs">
                        <p className="text-slate-400 mb-1">{form.tenorUnit==='weeks'?'Weekly':'Monthly'} Amount 1 (auto)</p>
                        <p className="text-white font-bold mono text-sm">{form.notionalCurrency} {fmt(amount1,2)}</p>
                        <p className="text-slate-500">Amount 2 ÷ 2</p>
                    </div>
                </div>
            )}

            {maturityDate && notional > 0 && (
                <div className="mt-3 bg-violet-900/20 border border-violet-500/20 rounded-lg p-3 text-xs text-violet-300 space-y-1">
                    <p className="font-medium">Trade Preview</p>
                    <p>Maturity: {maturityDate} · {schedPreview} {form.tenorUnit==='weeks'?'weekly':'monthly'} fixing{schedPreview!==1?'s':''}</p>
                    {form.bufferEnabled && form.bufferPrice && form.strikePrice && (
                        <p>In-zone: between ${fmt(Math.min(parseFloat(form.strikePrice),parseFloat(form.bufferPrice)),2)} and ${fmt(Math.max(parseFloat(form.strikePrice),parseFloat(form.bufferPrice)),2)}</p>
                    )}

            )}

            <div className="flex gap-2 mt-5">
                <button onClick={handleSave} className="btn-primary flex-1 px-4 py-2 rounded-lg font-semibold text-sm">
                    {trade?'Update Trade':'Create Trade'}

        </Modal>

// ─── ACCUMULATOR MODULE ───────────────────────────────────────────────────────
const AccumulatorModule = ({prices}) => {
    const [trades, setTrades] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cpb_acc_trades')||'[]');}catch{return[];} });
    const [config, setConfig] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cpb_acc_config')||'{}');}catch{return{};} });
    const [showAdd, setShowAdd] = useState(false);
    const [editingTrade, setEditingTrade] = useState(null);
    const [showSettings, setShowSettings] = useState(false);
    const [filterStatus, setFilterStatus] = useState('all');
    const [sheetsLoading, setSheetsLoading] = useState(false);

    useEffect(()=>{ localStorage.setItem('cpb_acc_trades', JSON.stringify(trades)); }, [trades]);
    useEffect(()=>{ localStorage.setItem('cpb_acc_config', JSON.stringify(config)); }, [config]);
    // Auto-sync from Sheets on load and every 30 seconds — picks up trades added by other users
    useEffect(()=>{ if(config.scriptUrl){fetchFromSheets();const t=setInterval(fetchFromSheets,30000);return()=>clearInterval(t);} },[config.scriptUrl]);

    // Auto-fetch missing Binance fixing prices for past settlement dates (up to 30 days back).
    // Runs on load and whenever trades change. Silently populates prices so only Confirm is needed.
    useEffect(()=>{
        const today=todayUTC();
        const past30=new Date(new Date().getTime()-30*86400000).toISOString().split('T')[0];
        const toFetch=[];
        trades.forEach(trade=>{
            if(!['Active','Knocked Out'].includes(trade.status)) return;
            const symbol=ACC_UNDERLYING_SYMBOLS[trade.underlyingPair];
            if(!symbol) return;
            buildAccSchedule(trade).forEach(date=>{
                if(date>=today||date<past30) return;
                const existing=(trade.fixings||[]).find(f=>f.date===date);
                if(existing?.fixingPrice) return; // already have price
                toFetch.push({tradeId:trade.id,date,symbol});
            });
        });
        if(!toFetch.length) return;
        // Fetch sequentially with 300ms delay to avoid rate limiting
        (async()=>{
            for(const {tradeId,date,symbol} of toFetch){
                try{
                    await new Promise(r=>setTimeout(r,300));
                    const price=await fetchBinanceFixing(symbol,date);
                    setTrades(prev=>prev.map(trade=>{
                        if(trade.id!==tradeId) return trade;
                        const fixings=[...(trade.fixings||[])];
                        const idx=fixings.findIndex(f=>f.date===date);
                        if(idx>=0){
                            if(fixings[idx].fixingPrice) return trade; // already set
                            fixings[idx]={...fixings[idx],fixingPrice:price.toFixed(2)};
                        } else {
                            fixings.push({date,fixingPrice:price.toFixed(2),confirmed:false});
                        }
                        const updated={...trade,fixings};
                        pushTrade(updated);
                        return updated;
                    }));
                } catch(e){
                    console.warn('Auto-fetch failed for '+symbol+' '+date+':',e.message);
                }
            }
        })();
    },[trades.length]); // run when trade count changes (new sync)

    const pushTrade = async (trade) => {
        if (!config.scriptUrl) return;
        try {
            await accSheetsCall(config.scriptUrl, {action:'upsertAccOrder', values:JSON.stringify(accTradeToRow(trade))});
        } catch(e) { console.error('Acc Sheets push failed:', e.message); }
    };

    const addTrade = async (t) => {
        setTrades(p=>[...p, t]); setShowAdd(false); await pushTrade(t);
    };
    const updateTrade = async (t) => {
        setTrades(p=>p.map(x=>x.id===t.id?t:x)); setEditingTrade(null); await pushTrade(t);
    };
    const deleteTrade = (id) => {
        if (confirm('Delete this Accumulator trade?')) setTrades(p=>p.filter(t=>t.id!==id));
    };

    // Save a fixing price for a date
    const saveFixing = async (tradeId, date, fixingPrice) => {
        setTrades(prev => {
            const updated = prev.map(trade => {
                if (trade.id !== tradeId) return trade;
                const fixings = [...(trade.fixings||[])];
                const idx = fixings.findIndex(f=>f.date===date);
                if (idx >= 0) fixings[idx] = {...fixings[idx], fixingPrice, confirmed:false};
                else fixings.push({date, fixingPrice, confirmed:false});
                const updated = {...trade, fixings};
                pushTrade(updated);
                return updated;
            });
            return updated;
        });
    };

    // Confirm a fixing — update status if KO or final period, log settlement to Sheets
    const confirmFixing = async (tradeId, date) => {
        // Compute all settlement data BEFORE setTrades — setTrades updater runs
        // asynchronously so variables set inside it are not available afterwards.
        const currentTrades = trades;
        const trade = currentTrades.find(t => t.id === tradeId);
        if (!trade) return;
        const fixings = [...(trade.fixings||[])];
        const idx = fixings.findIndex(f => f.date === date);
        if (idx < 0) return;
        const fp = parseFloat(fixings[idx].fixingPrice);
        if (!fp) { alert('No fixing price for this date. Please fetch or enter a price first.'); return; }

        const scenario = accScenario(trade, fp);
        const isKO = accIsKO(trade, fp);
        const confirmedBefore = fixings.filter(f => f.confirmed).length;
        const amounts = accAmounts(trade, scenario, confirmedBefore, isKO);
        const amount2 = trunc2((parseFloat(trade.notionalAmount)||0) / (parseInt(trade.tenorValue)||1));
        const remainingAfter = Math.max(0, parseFloat(trade.notionalAmount) - (confirmedBefore + 1) * amount2);
        const schedule = buildAccSchedule(trade);
        const isLast = date === schedule[schedule.length-1];
        let newStatus = trade.status;
        if (isKO) newStatus = 'Knocked Out';
        else if (isLast) newStatus = 'Matured';

        // Build settlement log before any async operations
        const settlementLog = {
            tradeId: trade.id,
            clientName: trade.clientName,
            underlyingPair: trade.underlyingPair,
            settlementDate: date,
            confirmedAt: new Date().toISOString(),
            scenario,
            isKO: isKO ? 'YES' : 'NO',
            cryptoQty: amounts.cryptoQty,
            cryptoCcy: amounts.cryptoCcy,
            baseAmount: amounts.baseAmount,
            notionalCcy: trade.notionalCurrency,
            remainingAfter,
            fixingPrice: fp,
            strikePrice: trade.strikePrice,
            koPrice: trade.knockOutEnabled ? trade.knockOutPrice : '',
        };

        // Update fixings array
        fixings[idx] = {...fixings[idx], confirmed:true, scenario, isKO,
            cryptoQty: amounts.cryptoQty, baseAmount: amounts.baseAmount};
        const updatedTrade = {...trade, fixings, status:newStatus};

        // Update state and push trade
        setTrades(prev => prev.map(t => t.id === tradeId ? updatedTrade : t));
        pushTrade(updatedTrade);

        // Push settlement log to ACC_Settlements sheet
        if (config.scriptUrl) {
            try {
                await accSheetsCall(config.scriptUrl, {
                    action: 'logSettlement',
                    values: JSON.stringify([
                        settlementLog.tradeId, settlementLog.clientName,
                        settlementLog.underlyingPair, settlementLog.settlementDate,
                        settlementLog.confirmedAt, settlementLog.scenario,
                        settlementLog.isKO,
                        settlementLog.cryptoQty ? settlementLog.cryptoQty.toFixed(8) : '0',
                        settlementLog.cryptoCcy, settlementLog.baseAmount,
                        settlementLog.notionalCcy, settlementLog.remainingAfter,
                        settlementLog.fixingPrice, settlementLog.strikePrice,
                        settlementLog.koPrice,
                    ])
                });
            } catch(e) { console.error('Settlement log failed:', e.message); }
        }
    };

    const fetchFromSheets = async () => {
        if (!config.scriptUrl) return;
        setSheetsLoading(true);
        try {
            const res = await accSheetsCall(config.scriptUrl, {action:'readAccOrders'});
            if (res.values?.length) setTrades(res.values.filter(r=>r[0]&&r[1]).map(accRowToTrade));
        } catch(e) { alert('Accumulator sync error: '+e.message); }
        setSheetsLoading(false);
    };

    const filtered = trades.filter(t => {
        if (filterStatus==='all') return true;
        if (filterStatus==='active') return t.status==='Active';
        if (filterStatus==='knocked-out') return t.status==='Knocked Out';
        if (filterStatus==='matured') return t.status==='Matured';
        return true;
    });

    return (
        <div>
            <AccumulatorDashboard trades={trades} prices={prices} onConfirmFixing={confirmFixing} onFetchPrice={async(tradeId,date,pair)=>{
                const symbol=ACC_UNDERLYING_SYMBOLS[pair]||'';
                if(!symbol) return;
                try{
                    const price=await fetchBinanceFixing(symbol,date);
                    saveFixing(tradeId,date,price.toFixed(2));
                } catch(e){alert('Failed to fetch price: '+e.message);}
            }}/>

            <div className="flex flex-wrap gap-2 mb-5 justify-between items-center">
                <div className="flex gap-2 flex-wrap">
                    <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="w-auto text-xs px-2 py-1.5">
                        <option value="all">All</option>
                        <option value="active">Active</option>
                        <option value="knocked-out">Knocked Out</option>
                        <option value="matured">Matured</option>
                    </Select>
                    {config.scriptUrl && (
                        <button onClick={fetchFromSheets} disabled={sheetsLoading} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5">
                            <Icon.Refresh spin={sheetsLoading}/> Sync Sheets
                        </button>
                    )}
                    <button onClick={()=>setShowSettings(!showSettings)} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5">
                        <Icon.Settings/> Config
                    </button>
                </div>
                <button onClick={()=>setShowAdd(true)} className="btn-primary px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2">
                    <Icon.Plus/> New Accumulator
                </button>
            </div>

            {showSettings && (
                <div className="card p-5 mb-5">
                    <h3 className="font-semibold mb-3 text-sm">Google Sheets Config — Accumulator</h3>
                    <p className="text-xs text-slate-500 mb-3">Separate spreadsheet from Loans, SSPS, and FCN.</p>
                    <Field label="Apps Script URL">
                        <Input value={config.scriptUrl||''} onChange={e=>setConfig(p=>({...p,scriptUrl:e.target.value}))} placeholder="https://script.google.com/macros/s/.../exec"/>
                    </Field>
                    <div className="flex gap-2 mt-3">
                        <button onClick={()=>{ localStorage.setItem('cpb_acc_config',JSON.stringify(config)); setShowSettings(false); if(config.scriptUrl) fetchFromSheets(); }} className="btn-primary px-4 py-2 rounded-lg text-sm">Save & Connect</button>
                        <button onClick={()=>setShowSettings(false)} className="btn-secondary px-4 py-2 rounded-lg text-sm">Cancel</button>
                    </div>
                </div>
            )}

            {filtered.length === 0
                ? <div className="card p-12 text-center"><p className="text-slate-400">No Accumulator trades found.</p></div>
                : <div className="space-y-3">
                    {filtered.map(t => (
                        <AccumulatorCard key={t.id} trade={t} prices={prices}
                            onEdit={setEditingTrade} onDelete={deleteTrade}
                            onSaveFix={saveFixing} onConfirmFixing={confirmFixing}/>
                    ))}
                </div>
            }

            {showAdd && <AccumulatorFormModal onSave={addTrade} onClose={()=>setShowAdd(false)}/>}
            {editingTrade && <AccumulatorFormModal trade={editingTrade} onSave={updateTrade} onClose={()=>setEditingTrade(null)}/>}
        </div>
    );
};

const App = () => {

    // Bybit prices — Loans + SSPS only (BTC, ETH)
    const [bybitPrices,setBybitPrices]=useState({BTC:0,ETH:0});
    const [bybitUpdate,setBybitUpdate]=useState(null);
    // Binance prices — FCN + Accumulator only (BTC, ETH, ADA, XRP)
    const [binancePrices,setBinancePrices]=useState({BTC:0,ETH:0,ADA:0,XRP:0});
    const [binanceUpdate,setBinanceUpdate]=useState(null);

    const fetchBybitPrices=useCallback(async()=>{
        try {
            const [btc,eth]=await Promise.allSettled([
                fetchBybitLive('BTCUSDT'),
                fetchBybitLive('ETHUSDT'),
            ]);
            setBybitPrices(p=>({
                BTC:btc.status==='fulfilled'?btc.value:p.BTC,
                ETH:eth.status==='fulfilled'?eth.value:p.ETH,
            }));
            setBybitUpdate(new Date());
        } catch(e){console.error('Bybit price error',e);}
    },[]);

    const fetchBinancePrices=useCallback(async()=>{
        try {
            const [btc,eth,ada,xrp]=await Promise.allSettled([
                fetchBinanceLive('BTCUSDT'),
                fetchBinanceLive('ETHUSDT'),
                fetchBinanceLive('ADAUSDT'),
                fetchBinanceLive('XRPUSDT'),
            ]);
            setBinancePrices(p=>({
                BTC:btc.status==='fulfilled'?btc.value:p.BTC,
                ETH:eth.status==='fulfilled'?eth.value:p.ETH,
                ADA:ada.status==='fulfilled'?ada.value:p.ADA,
                XRP:xrp.status==='fulfilled'?xrp.value:p.XRP,
            }));
            setBinanceUpdate(new Date());
        } catch(e){console.error('Binance price error',e);}
    },[]);

    useEffect(()=>{
        fetchBybitPrices(); const t1=setInterval(fetchBybitPrices,60000);
        fetchBinancePrices(); const t2=setInterval(fetchBinancePrices,60000);
        return()=>{clearInterval(t1);clearInterval(t2);};
    },[]);

    return(
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 text-white">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-6">
                <div className="mb-6">
                    <h1 className="text-3xl font-bold gradient-text mb-1">Crypto Prime Broker</h1>
                    <p className="text-slate-500 text-sm">Internal Portfolio Management System</p>
                </div>
                <PriceTicker bybitPrices={bybitPrices} binancePrices={binancePrices} bybitUpdate={bybitUpdate} binanceUpdate={binanceUpdate}/>
                <div className="flex gap-1 mb-6 border-b border-slate-800">
                    {[['loans','Securitised Loans'],['ssps','Smart Participation Swap'],['fcn','Fixed Coupon Note'],['acc','Accumulator']].map(([id,label])=>(
                        <button key={id} onClick={()=>setTab(id)} className={`px-4 py-2.5 text-sm font-medium transition-all ${tab===id?'tab-active':'tab-inactive'}`}>{label}</button>
                    ))}
                </div>
                {tab==='loans'?<LoanModule prices={bybitPrices}/>:tab==='ssps'?<SSPSModule prices={bybitPrices}/>:tab==='fcn'?<FCNModule prices={binancePrices}/>:<AccumulatorModule prices={binancePrices}/>}
            </div>
        </div>
    );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
