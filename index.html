<script>
// ─── PASSWORD LOCK ────────────────────────────────────────────────────────────
// To change the password in future:
//   1. Go to https://emn178.github.io/online-tools/sha256.html
//   2. Type your new password → copy the hash shown
//   3. Replace the hash string below with the new one
//   4. Redeploy to Vercel
//
// Current password hash — SHA-256 of "breakfastclub2026":
const PASSWORD_HASH = "7137a84a39355cca8de10ad1f8efe081e5b95eecc518e2d230546f3d59b72ad5";
const AUTH_KEY      = "cpb_auth_token";
const AUTH_DURATION = 7 * 24 * 60 * 60 * 1000; // 7 days in ms

async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function isAuthValid() {
    try {
        const stored = JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
        if (!stored || !stored.ts) return false;
        return (Date.now() - stored.ts) < AUTH_DURATION;
    } catch { return false; }
}

function storeAuth() {
    localStorage.setItem(AUTH_KEY, JSON.stringify({ ts: Date.now() }));
}

function showLockScreen() {
    const overlay = document.getElementById('auth-overlay');
    overlay.style.display = 'flex';
    overlay.innerHTML = `
        <div style="width:100%;max-width:400px;padding:0 24px;">
            <div style="text-align:center;margin-bottom:32px;">
                <div style="font-size:40px;margin-bottom:14px;">🔒</div>

            </div>
            <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:28px;">
                <label style="display:block;font-size:11px;color:#94a3b8;font-family:sans-serif;margin-bottom:8px;letter-spacing:0.08em;text-transform:uppercase;">Password</label>
                <input id="pw-input" type="password" placeholder="Enter password"
                    style="width:100%;box-sizing:border-box;background:#0f172a;border:1px solid #475569;
                           border-radius:8px;padding:11px 14px;color:#f8fafc;font-size:15px;
                           font-family:monospace;outline:none;margin-bottom:8px;" />
                <div id="pw-error" style="color:#f87171;font-size:12px;font-family:sans-serif;min-height:18px;margin-bottom:8px;"></div>
                <button id="pw-btn"
                    style="width:100%;background:#0ea5e9;border:none;border-radius:8px;
                           padding:12px;color:#fff;font-size:14px;font-family:sans-serif;
                           font-weight:600;cursor:pointer;transition:background 0.15s;">
                    Unlock
                </button>
                <p style="color:#475569;font-size:11px;font-family:sans-serif;text-align:center;margin:14px 0 0;">
                    Session stays unlocked for 7 days
                </p>
            </div>
        </div>`;

    const input = document.getElementById('pw-input');
    const btn   = document.getElementById('pw-btn');
    const err   = document.getElementById('pw-error');

    async function attempt() {
        const val = input.value;
        if (!val) { err.textContent = 'Please enter a password.'; return; }
        btn.textContent = 'Checking…';
        btn.disabled = true;
        err.textContent = '';
        const hash = await sha256(val);
        if (hash === PASSWORD_HASH) {
            storeAuth();
            overlay.style.display = 'none';
            document.getElementById('root').style.display = '';
        } else {
            err.textContent = 'Incorrect password. Please try again.';
            input.value = '';
            input.focus();
            btn.textContent = 'Unlock';
            btn.disabled = false;
        }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    setTimeout(() => input.focus(), 80);
}

// On page load — check existing auth before rendering anything
(function init() {
    if (isAuthValid()) {
        document.getElementById('auth-overlay').style.display = 'none';
    } else {
        document.getElementById('root').style.display = 'none';
        showLockScreen();
    }
})();

const fmt = (n, d=2) => (n||0).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtCrypto = (n, d=8) => (n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:d});
const fmtDate = (s) => {
    if (!s) return '';
    // Normalise: if string looks like ISO "YYYY-MM-DD" use UTC, else parse as-is
    const d = /^\d{4}-\d{2}-\d{2}$/.test(s) ? new Date(s+'T00:00:00Z') : new Date(s);
    if (isNaN(d.getTime())) return s; // return raw if unparseable
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${d.getUTCDate()}-${months[d.getUTCMonth()]}-${d.getUTCFullYear()}`;
};
const fmtDateTimeSGT = (iso) => {
    if (!iso) return '';
    return new Date(iso).toLocaleString('en-SG', {timeZone:'Asia/Singapore',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});
};
const daysUntil = (dateStr) => {
    const today = new Date(); today.setUTCHours(0,0,0,0);
    const target = new Date(dateStr+'T00:00:00Z');
    return Math.ceil((target - today) / 86400000);
};
const todayUTC = () => new Date().toISOString().split('T')[0];
// Local calendar date in the user's timezone — used for form defaults so the date
// matches what the user sees on their calendar (not the UTC date which can be yesterday).
const todayLocal = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// Convert any date format from Google Sheets to YYYY-MM-DD string.
// Sheets returns dates in 3 possible forms:
//   1. Already ISO: "2026-02-25"  → return as-is
//   2. US locale string: "2/25/2026" → parse with Date()
//   3. Serial number: 46872 (days since 30-Dec-1899) → convert via Unix epoch offset
const normaliseSheetDate = (raw) => {
    if (!raw && raw !== 0) return '';
    const s = String(raw).trim();
    if (!s) return '';
    // Already ISO YYYY-MM-DD — return as-is (no timezone conversion needed)
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // Pure integer: Google Sheets date serial (days since 30-Dec-1899)
    if (/^\d+$/.test(s)) {
        const serial = parseInt(s, 10);
        const unixDays = serial > 60 ? serial - 25569 : serial - 25568;
        const d = new Date(unixDays * 86400000);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
        return '';
    }
    // US locale "M/D/YYYY" — parse parts to avoid local-timezone shift
    const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (us) {
        const [,m,d,y] = us;
        return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // DD/MM/YYYY (some locales)
    const eu = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (eu && parseInt(eu[1]) > 12) { // day > 12 means it can't be month
        const [,d,m,y] = eu;
        return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
    }
    // ISO with time component like "2026-02-17T00:00:00.000Z" — take date part only
    if (/^\d{4}-\d{2}-\d{2}T/.test(s)) return s.slice(0,10);
    // Last resort: parse with Date in UTC by appending T00:00:00Z
    const d = new Date(s.includes('T') ? s : s + 'T00:00:00Z');
    if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
    return '';
};

// ─── BYBIT API ────────────────────────────────────────────────────────────────
// Live spot price via tickers endpoint (used for top-of-page ticker, every 60s)
const fetchBybitLive = async (symbol) => {
    const r = await fetch(`https://api.bybit.com/v5/market/tickers?category=spot&symbol=${symbol}`);
    const d = await r.json();
    if (d.retCode===0 && d.result?.list?.length>0) return parseFloat(d.result.list[0].lastPrice);
    throw new Error('No ticker data');
};

// 08:00 UTC open price via hourly kline (= 16:00 SGT fixing price).
// Bybit V5 kline: ascending=false (default), results DESCENDING (newest first).
// Each candle: [startTimeMs(string), open, high, low, close, volume, turnover]
//
// Reliable strategy:
//   - Request 3 candles in a 3-hour window centred on T08:00 UTC
//   - window: T06:00Z → T10:00Z (start is inclusive, end is exclusive in Bybit V5)
//   - Pick the candle whose startTime is closest to T08:00Z
//   - Only accept if within ±30 min of target (1800000ms) — reject otherwise
//   - Never silently use a wrong candle (a wrong price corrupts the whole ledger)
const fetchBybitFixing = async (symbol, dateStr) => {
    const target = new Date(`${dateStr}T08:00:00Z`).getTime(); // ms
    // Wide window: T06:00→T10:00 UTC, ask for up to 5 candles
    const start = target - 2 * 3600000; // T06:00 UTC
    const end   = target + 2 * 3600000; // T10:00 UTC  (exclusive)
    const url = `https://api.bybit.com/v5/market/kline?category=spot&symbol=${symbol}&interval=60&start=${start}&end=${end}&limit=5`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.retCode !== 0) {
        throw new Error(`Bybit kline API error: ${d.retMsg} (${symbol} ${dateStr})`);
    }
    const list = d.result?.list || [];
    if (!list.length) {
        throw new Error(`Bybit returned no candles for ${symbol} on ${dateStr}`);
    }
    // Find candle closest to 08:00 UTC
    let best = null, bestDiff = Infinity;
    for (const c of list) {
        const ts = parseInt(c[0], 10);
        const diff = Math.abs(ts - target);
        if (diff < bestDiff) { bestDiff = diff; best = c; }
    }
    // Only accept if within ±30 minutes of 08:00 UTC
    if (!best || bestDiff > 1800000) {
        const got = list.map(c => new Date(parseInt(c[0])).toISOString()).join(', ');
        throw new Error(`No candle within 30min of 08:00 UTC for ${symbol} ${dateStr}. Got: ${got}`);
    }
    const price = parseFloat(best[1]); // open price
    if (!price || price <= 0) throw new Error(`Bad price ${price} for ${symbol} ${dateStr}`);
    return price;
};

// Binance Price Index kline at 08:00 UTC — the termsheet fixing endpoint.
// Uses fapi.binance.com/fapi/v1/indexPriceKlines (composite index, not spot).
// Confirmed working in browser test on 2026-04-14.
// Same window/candle-selection logic as fetchBybitFixing for consistency.
const fetchBinanceFixing = async (symbol, dateStr) => {
    const target = new Date(`${dateStr}T08:00:00Z`).getTime();
    const start  = target - 2 * 3600000; // T06:00 UTC
    const end    = target + 2 * 3600000; // T10:00 UTC
    // Primary: Binance Price Index kline (termsheet benchmark)
    const indexUrl = `https://fapi.binance.com/fapi/v1/indexPriceKlines?pair=${symbol}&contractType=PERPETUAL&interval=1h&startTime=${start}&endTime=${end}&limit=5`;
    // Fallback: Binance spot kline (tracks index within ~0.01%)
    const spotUrl  = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1h&startTime=${start}&endTime=${end}&limit=5`;
    let list = null;
    try {
        const r = await fetch(indexUrl);
        const d = await r.json();
        if (!Array.isArray(d) || !d.length) throw new Error('Empty index response');
        list = d;
    } catch(e) {
        // Fallback to spot kline
        const r2 = await fetch(spotUrl);
        const d2 = await r2.json();
        if (!Array.isArray(d2) || !d2.length) throw new Error(`Binance: no candles for ${symbol} ${dateStr}`);
        list = d2;
    }
    let best = null, bestDiff = Infinity;
    for (const c of list) {
        const ts = parseInt(c[0], 10);
        const diff = Math.abs(ts - target);
        if (diff < bestDiff) { bestDiff = diff; best = c; }
    }
    if (!best || bestDiff > 1800000) {
        const got = list.map(c => new Date(parseInt(c[0])).toISOString()).join(', ');
        throw new Error(`No Binance candle within 30min of 08:00 UTC for ${symbol} ${dateStr}. Got: ${got}`);
    }
    const price = parseFloat(best[1]);
    if (!price || price <= 0) throw new Error(`Bad Binance price ${price} for ${symbol} ${dateStr}`);
    return price;
};

// Backfill: walk every calendar day from fromDate up to (not including) today,

// fetch both BTC and ETH 08:00 UTC opens from Bybit for missing entries.
const runBackfill = async (fromDate, toDate, existingHistory, onProgress) => {
    const history = { ...existingHistory };
    // Stop at yesterday strictly — today's fixing runs via fetchTodayPrices at 16:00 SGT.
    // yesterdayUTC: today minus 1 day in YYYY-MM-DD format.
    const todayStr = todayUTC();
    const yesterdayMs = new Date(todayStr+'T00:00:00Z').getTime() - 86400000;
    const yesterdayStr = new Date(yesterdayMs).toISOString().split('T')[0];
    // Don't go past maturity either
    const stopStr = toDate < yesterdayStr ? toDate : yesterdayStr;
    // Collect dates needing a fetch (missing or no valid price for both symbols)
    const dates = [];
    let d = new Date(fromDate+'T00:00:00Z');
    const stopMs = new Date(stopStr+'T00:00:00Z').getTime();
    while (d.getTime() <= stopMs) {
        const ds = d.toISOString().split('T')[0];
        const e = existingHistory[ds];
        if (!e || (!e.BTC && !e.ETH)) dates.push(ds);
        d.setUTCDate(d.getUTCDate()+1);
    }
    for (let i=0; i<dates.length; i++) {
        const ds = dates[i];
        const [btc, eth] = await Promise.allSettled([
            fetchBybitFixing('BTCUSDT', ds),
            fetchBybitFixing('ETHUSDT', ds),
        ]);
        history[ds] = {
            BTC: btc.status==='fulfilled' ? btc.value : (existingHistory[ds]?.BTC||null),
            ETH: eth.status==='fulfilled' ? eth.value : (existingHistory[ds]?.ETH||null),
            fetchedAt: new Date().toISOString(),
        };
        if (onProgress) onProgress(i+1, dates.length);
        await new Promise(r => setTimeout(r, 150)); // gentle rate limiting
    }
    return { history, datesProcessed: dates.length };
};

// LOAN TRADING DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
const LoanDashboard = ({loans, prices, calcMetrics}) => {
    const [lastRefresh, setLastRefresh] = React.useState(new Date());
    const [showInterestModal, setShowInterestModal] = React.useState(null); // 'prev' | 'curr'
    const [showMCModal, setShowMCModal] = React.useState(false);

    // Auto-refresh every 60 seconds
    React.useEffect(() => {
        const t = setInterval(() => setLastRefresh(new Date()), 60000);
        return () => clearInterval(t);
    }, []);

    const activeLoans = loans.filter(l => l.status === 'Active');
    if (!activeLoans.length) return null;

    const today = new Date();

    // ── Interest calc: strictly within calendar month (360-day year) ──────────
    const calcMonthInterest = (loan, year, month) => {
        // month is 0-indexed (Jan=0)
        if (!loan.startDate) return 0;
        const loanStart = new Date(loan.startDate);
        const isOpenTerm = !loan.maturityDate || loan.maturityDate === '';
        // For open-term Active loans: no maturity cap — accrue to end of period
        // For matured/repaid open-term: use today as the cap (best approximation)
        const loanEnd = isOpenTerm
            ? (loan.status === 'Active' ? new Date(9999,0,1) : new Date())
            : new Date(loan.maturityDate);
        // Period: 1st of month to last day of month (or today if current month)
        const periodStart = new Date(year, month, 1);
        const isCurrentMonth = (year === today.getFullYear() && month === today.getMonth());
        // Set to END of last day (23:59:59.999) so all days in month are counted.
        // new Date(year, month+1, 0) = midnight of last day → only 27 days counted for Feb.
        // new Date(year, month+1, 0, 23, 59, 59, 999) = end of last day → full 28 days counted.
        const periodEnd = isCurrentMonth ? today : new Date(year, month + 1, 0, 23, 59, 59, 999);
        // Clamp to loan active period
        const effectiveStart = new Date(Math.max(loanStart, periodStart));
        const effectiveEnd   = new Date(Math.min(loanEnd, periodEnd));
        if (effectiveStart >= effectiveEnd) return 0;
        const days = Math.floor((effectiveEnd - effectiveStart) / 86400000);
        if (days <= 0) return 0;
        return loan.loanAmount * loan.interestRate / 100 * days / 360;
    };

    // Previous month
    const prevMonth = today.getMonth() === 0 ? 11 : today.getMonth() - 1;
    const prevYear  = today.getMonth() === 0 ? today.getFullYear() - 1 : today.getFullYear();
    const prevMonthName = new Date(prevYear, prevMonth, 1).toLocaleString('en-SG', {month:'long', year:'numeric'});
    const currMonthName = today.toLocaleString('en-SG', {month:'long', year:'numeric'});

    // Interest breakdowns — only loans that accrued something
    const prevInterestRows = activeLoans.map(l => ({
        loan: l,
        interest: calcMonthInterest(l, prevYear, prevMonth)
    })).filter(r => r.interest > 0.005);

    const currInterestRows = activeLoans.map(l => ({
        loan: l,
        interest: calcMonthInterest(l, today.getFullYear(), today.getMonth())
    })).filter(r => r.interest > 0.005);

    const totalPrevInterest = prevInterestRows.reduce((s, r) => s + r.interest, 0);
    const totalCurrInterest = currInterestRows.reduce((s, r) => s + r.interest, 0);

    // ── Collateral breakdown by type ─────────────────────────────────────────
    const collateralTypes = [...new Set(activeLoans.map(l => l.collateralType))].filter(Boolean);
    const collateralGroups = collateralTypes.map(type => {
        // Exclude unsecured loans from collateral calculations
        const group = activeLoans.filter(l => l.collateralType === type && l.secured !== false && l.secured !== 'false');
        const totalCollateral = group.reduce((s, l) => s + l.collateralAmount, 0);
        const price = prices[type] || 0;
        const totalCollVal = totalCollateral * price;
        const totalLoan = group.reduce((s, l) => s + l.loanAmount, 0);
        const ratio = totalLoan > 0 ? (totalCollVal / totalLoan) * 100 : 0;
        // Check if any loan in this group is at risk
        const anyAtRisk = group.some(l => calcMetrics(l).atRisk);
        return { type, totalCollateral, totalCollVal, totalLoan, ratio, anyAtRisk, price };
    });

    // ── Active loans by counterparty ─────────────────────────────────────────
    const counterpartyMap = {};
    activeLoans.forEach(l => {
        if (!counterpartyMap[l.counterparty]) counterpartyMap[l.counterparty] = { name: l.counterparty, total: 0, loans: [] };
        counterpartyMap[l.counterparty].total += l.loanAmount;
        counterpartyMap[l.counterparty].loans.push(l);
    });
    const counterparties = Object.values(counterpartyMap).sort((a,b) => b.total - a.total);
    const totalActive = activeLoans.reduce((s,l) => s + l.loanAmount, 0);

    // ── Nearest margin call ───────────────────────────────────────────────────
    const mcLoans = activeLoans.filter(l=>l.secured!==false&&l.secured!=='false').map(l => {
        const m = calcMetrics(l);
        const price = prices[l.collateralType] || 0;
        const absDrop = price - m.mcPrice;
        const pctDrop = price > 0 ? (absDrop / price) * 100 : 0;
        return { loan: l, ...m, price, absDrop, pctDrop };
    }).filter(r => r.price > 0).sort((a,b) => a.pctDrop - b.pctDrop); // nearest first

    const nearest = mcLoans[0];

    // ── At-risk count ─────────────────────────────────────────────────────────
    const atRiskCount = activeLoans.filter(l => calcMetrics(l).atRisk).length;

    // ── Expiring within 7 days ────────────────────────────────────────────────
    const in7days = new Date(today.getTime() + 7 * 86400000);
    const expiring = activeLoans.filter(l => {
        if (!l.maturityDate || l.maturityDate === '') return false; // open-term never expires
        const mat = new Date(l.maturityDate);
        return mat >= today && mat <= in7days;
    }).sort((a,b) => new Date(a.maturityDate) - new Date(b.maturityDate));

    const refreshLabel = lastRefresh.toLocaleTimeString('en-SG', {hour:'2-digit', minute:'2-digit'});

    return (
        <div className="mb-6">
            {/* Header */}
            <div className="flex items-center justify-between mb-3">
                <h2 className="text-sm font-semibold text-slate-300 flex items-center gap-2">
                    <span className="w-2 h-2 rounded-full bg-cyan-400 inline-block"></span>
                    Loan Book Dashboard
                </h2>
                <div className="flex items-center gap-2">
                    <span className="text-xs text-slate-500">Updated {refreshLabel}</span>
                    <button onClick={()=>setLastRefresh(new Date())} className="btn-secondary px-2 py-1 rounded text-xs flex items-center gap-1"><Icon.Refresh/> Refresh</button>
                </div>
            </div>

            {/* Expiring loans banner */}
            {expiring.length > 0 && (
                <div className="bg-amber-900/30 border border-amber-500/40 rounded-lg p-3 mb-3 flex flex-wrap gap-3 items-center">
                    <span className="text-amber-300 font-semibold text-xs flex items-center gap-1.5"><Icon.Alert/> Expiring within 7 days:</span>
                    {expiring.map(l => (
                        <span key={l.id} className="text-xs text-amber-200 mono bg-amber-900/40 px-2 py-0.5 rounded">
                            {l.counterparty} — ${fmt(l.loanAmount)} — matures {fmtDate(l.maturityDate)}
                        </span>
                    ))}
                </div>
            )}

            {/* At-risk banner */}
            {atRiskCount > 0 && (
                <div className="bg-red-900/30 border border-red-500/40 rounded-lg p-3 mb-3 flex items-center gap-3">
                    <span className="text-red-300 font-bold text-sm flex items-center gap-2">
                        <Icon.Alert/>
                        {atRiskCount} loan{atRiskCount > 1 ? 's' : ''} in margin call territory
                    </span>
                    <span className="text-xs text-red-400">Telegram alert has been sent via server-side monitor.</span>
                </div>
            )}

            {/* Main dashboard grid */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 mb-3">

                {/* 1 — Active loans by counterparty + currency breakdown */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-2 font-medium">Active Loan Book</p>
                    <p className="text-xl font-bold mono text-white mb-0.5">${fmt(totalActive, 0)}</p>
                    <p className="text-xs text-slate-500 mb-2">{activeLoans.length} active loan{activeLoans.length!==1?'s':''}</p>
                    {/* Currency breakdown */}
                    {(()=>{
                        const currencies = [...new Set(activeLoans.map(l=>l.underlying))].filter(Boolean);
                        return currencies.length > 1 ? (
                            <div className="flex gap-2 mb-3">
                                {currencies.map(cur=>{
                                    const total = activeLoans.filter(l=>l.underlying===cur).reduce((s,l)=>s+l.loanAmount,0);
                                    return (
                                        <div key={cur} className="flex-1 bg-slate-800/60 rounded px-2 py-1 text-center">
                                            <p className="text-xs text-slate-400">{cur}</p>
                                            <p className="text-xs font-bold mono text-cyan-400">${fmt(total,0)}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : null;
                    })()}
                    {/* Counterparty breakdown */}
                    <div className="space-y-1.5">
                        {counterparties.map(cp => (
                            <div key={cp.name} className="flex items-center justify-between">
                                <span className="text-xs text-slate-300 truncate max-w-[55%]">{cp.name}</span>
                                <div className="flex items-center gap-2">
                                    <div className="w-16 h-1 bg-slate-700 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-500 rounded-full" style={{width:`${Math.min(100,(cp.total/totalActive)*100)}%`}}/>
                                    </div>
                                    <span className="text-xs mono text-slate-300">${fmt(cp.total,0)}</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* 2 — Collateral by type */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-2 font-medium">Collateral Holdings</p>
                    {collateralGroups.length === 0 ? (
                        <p className="text-xs text-slate-500">No collateral data</p>
                    ) : (
                        <div className="space-y-3">
                            {collateralGroups.map(g => (
                                <div key={g.type}>
                                    <div className="flex justify-between items-baseline mb-0.5">
                                        <span className="text-xs text-slate-400">{g.type} collateral</span>

                                    {/* Visual ratio bar */}
                                    <div className="mt-1.5 h-1 bg-slate-700 rounded-full overflow-hidden">
                                        <div className={`h-full rounded-full ${g.anyAtRisk?'bg-red-500':g.ratio<140?'bg-amber-500':'bg-green-500'}`}
                                             style={{width:`${Math.min(100,(g.ratio/200)*100)}%`}}/>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>

                {/* 3 — Interest panels */}
                <div className="card p-4">
                    <p className="text-xs text-slate-400 mb-2 font-medium">Interest Accrued</p>
                    <div className="space-y-3">
                        {/* Previous month */}
                        <button onClick={()=>setShowInterestModal(showInterestModal==='prev'?null:'prev')}

                            <div className="flex justify-between items-center">

                        <div className="border-t border-slate-700"/>

            {/* Interest breakdown modal */}

                    </div>

                                const loanEnd    = new Date(loan.maturityDate);
                                const periodStart = new Date(yr, mo, 1);
                                const isCurrentMonth = (yr===today.getFullYear()&&mo===today.getMonth());
                                const periodEnd = isCurrentMonth ? today : new Date(yr, mo+1, 0, 23, 59, 59, 999);
                                const effStart = new Date(Math.max(loanStart, periodStart));
                                const effEnd   = new Date(Math.min(loanEnd, periodEnd));
                                const days = Math.max(0, Math.floor((effEnd-effStart)/86400000));

                                        {r.atRisk?'BREACHED':fmt(r.pctDrop,1)+'%'}
                                    </td>
                                    <td className="py-2 text-right mono text-slate-300">{fmt(r.ratio,1)}%</td>
                                    <td className="py-2 text-right">
                                        {r.atRisk
                                            ? <span className="px-1.5 py-0.5 bg-red-500/20 text-red-400 rounded">⚠️ MC</span>
                                            : r.pctDrop<10
                                                ? <span className="px-1.5 py-0.5 bg-amber-500/20 text-amber-400 rounded">Near</span>
                                                : <span className="px-1.5 py-0.5 bg-green-500/20 text-green-400 rounded">OK</span>
                                        }
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
        </div>
    );
};

// ═══════════════════════════════════════════════════════════════════════════════
const LoanModule = ({prices}) => {
    const [loans, setLoans] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cpb_loans')||'[]');}catch{return[];} });
    const [transactions, setTransactions] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cpb_transactions')||'[]');}catch{return[];} });
    const [config, setConfig] = useState(()=>{ try{return JSON.parse(localStorage.getItem('cpb_loan_config')||'{}');}catch{return{};} });
    const [showAdd, setShowAdd] = useState(false);
    const [editingLoan, setEditingLoan] = useState(null);
    const [showSettings, setShowSettings] = useState(false);
    const [showTxn, setShowTxn] = useState(null);
    const [loading, setLoading] = useState(false);
    const [filterStatus, setFilterStatus] = useState('all');


    useEffect(()=>{ localStorage.setItem('cpb_loans',JSON.stringify(loans)); },[loans]);
    useEffect(()=>{ localStorage.setItem('cpb_transactions',JSON.stringify(transactions)); },[transactions]);
    useEffect(()=>{ localStorage.setItem('cpb_loan_config',JSON.stringify(config)); },[config]);



    const calcInterest = (loan) => {
        if (!loan.startDate) return 0;
        const start = new Date(loan.startDate);
        const today = new Date();
        let end;
        const isOpenTerm = !loan.maturityDate || loan.maturityDate === '';
        if (isOpenTerm) {
            // Open-term: accrue to today if Active, or to today if no maturity to cap at
            end = today;
        } else {
            const mat = new Date(loan.maturityDate);
            // If Active: accrue to today (or maturity if already past)
            // If Matured/Repaid: accrue only to maturity date (stop on that date)
            end = (loan.status === 'Active') ? (today < mat ? today : mat) : mat;
        }
        const days = Math.floor((end - start) / 86400000);
        return Math.max(0, loan.loanAmount * loan.interestRate / 100 * days / 360);
    };
    const calcMetrics = (loan) => {
        const isUnsecured = loan.secured === false || loan.secured === 'false';
        const price = prices[loan.collateralType] || 0;
        const collVal = isUnsecured ? 0 : loan.collateralAmount * price;
        const interest = calcInterest(loan), owed = loan.loanAmount + interest - loan.interestPaid;
        const ratio = (!isUnsecured && collVal > 0) ? (collVal / loan.loanAmount) * 100 : 0;
        // Unsecured loans can never be atRisk — no collateral ratio to breach
        const atRisk = !isUnsecured && ratio <= loan.marginCallThreshold && loan.status === 'Active';
        const mcPrice = (!isUnsecured && loan.collateralAmount > 0) ? (loan.loanAmount * loan.marginCallThreshold) / (loan.collateralAmount * 100) : 0;
        const topUp = (!isUnsecured && price > 0) ? Math.max(0, (loan.loanAmount * (loan.originalCollateralRatio / 100) - collVal) / price) : 0;
        return {collVal, interest, owed, ratio, atRisk, mcPrice, topUp, isUnsecured};
    };
    const calcTenor = (s,m)=>!s||!m?null:Math.ceil((new Date(m)-new Date(s))/86400000);

    // Normalise any date format from Sheets to plain YYYY-MM-DD.
    // getDisplayValues() returns dates in the spreadsheet's display format which
    // depends on the sheet locale and cell format type:
    //   - Text cells: "2026-01-28" (what we write)
    //   - Date cells (Singapore locale): "28/01/2026" or "1/28/2026"
    //   - ISO strings from old getValues() path: "2025-06-29T16:00:00.000Z"
    // All variants are normalised to YYYY-MM-DD here.
    const normaliseDate = (raw) => {
        if (!raw || raw === '' || raw === 'Open Term') return '';
        const s = String(raw).trim();
        if (!s) return '';
        // Already ISO date YYYY-MM-DD
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // ISO datetime with T — take date portion before T
        if (s.includes('T')) return s.split('T')[0];
        // DD/MM/YYYY — Singapore/UK locale display format
        const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (dmy) {
            const day   = dmy[1].padStart(2,'0');
            const month = dmy[2].padStart(2,'0');
            const year  = dmy[3];
            return `${year}-${month}-${day}`;
        }
        // M/D/YYYY — US locale display format
        const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (mdy) {
            const month = mdy[1].padStart(2,'0');
            const day   = mdy[2].padStart(2,'0');
            const year  = mdy[3];
            return `${year}-${month}-${day}`;
        }
        // DD-MM-YYYY or MM-DD-YYYY with dashes
        const dmy2 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
        if (dmy2) {
            // Ambiguous — assume DD-MM-YYYY (Singapore default)
            const day   = dmy2[1].padStart(2,'0');
            const month = dmy2[2].padStart(2,'0');
            const year  = dmy2[3];
            return `${year}-${month}-${day}`;
        }
        // Long date formats: "28 Jan 2026", "January 28, 2026", etc.
        // Use Date.parse but force UTC interpretation
        try {
            // Append time to force UTC parse and avoid timezone shift
            const d = new Date(s + ' UTC');
            if (!isNaN(d)) {
                return d.toISOString().split('T')[0];
            }
            // Try without UTC suffix
            const d2 = new Date(s);
            if (!isNaN(d2)) {
                // Use UTC date parts to avoid timezone shift
                const y = d2.getUTCFullYear();
                const m = String(d2.getUTCMonth()+1).padStart(2,'0');
                const day = String(d2.getUTCDate()).padStart(2,'0');
                return `${y}-${m}-${day}`;
            }
        } catch(e) {}
        return s;
    };

    const fetchSheets = async () => {
        if (!config.scriptUrl) return;
        setLoading(true);
        try {
            const [lr,tr] = await Promise.all([
                fetch(`${config.scriptUrl}?action=read&sheetName=Loans`).then(r=>r.json()),
                fetch(`${config.scriptUrl}?action=read&sheetName=Transactions`).then(r=>r.json())
            ]);
            if (lr.success && lr.values) {
                const today = new Date();
                today.setHours(0,0,0,0);
                const fetchedLoans = lr.values.filter(r=>r[0]&&r[1]).map(r=>({
                    id:r[0], counterparty:r[1], loanAmount:+r[2], underlying:r[3],
                    collateralAmount:+r[4], collateralType:r[5], interestRate:+r[6],
                    interestPaid:+r[8], tenor:(r[9]===''||r[9]==='null'||r[9]===null)?null:+r[9],
                    startDate:normaliseDate(r[10]),
                    maturityDate:(r[11]===''||r[11]==='Open Term')?'':normaliseDate(r[11]),
                    marginCallThreshold:+r[12], originalCollateralRatio:+r[13],
                    status:r[14], createdAt:r[15],
                    secured: r[16]===false||r[16]==='false'||r[16]==='Unsecured' ? false : true
                }));
                // Auto-mature loans whose maturity date has passed but are still marked Active
                // Skip open-term loans (no maturityDate) — they never auto-mature
                const toMature = fetchedLoans.filter(l => {
                    if (l.status !== 'Active' || !l.maturityDate) return false;
                    const mat = new Date(l.maturityDate); mat.setHours(0,0,0,0);
                    return mat < today;
                });
                for (const loan of toMature) {
                    loan.status = 'Matured';
                    try {
                        const rowIdx = lr.values.findIndex(r=>String(r[0]).trim()===String(loan.id).trim());
                        if (rowIdx >= 0) {
                            const sheetRow = rowIdx + 2;
                            const m = calcMetrics(loan);
                            await fetch(`${config.scriptUrl}?action=update&sheetName=Loans&rowIndex=${sheetRow}&values=${encodeURIComponent(JSON.stringify([
                                loan.id, loan.counterparty, loan.loanAmount,
                                loan.underlying, loan.collateralAmount, loan.collateralType,
                                loan.interestRate, m.interest.toFixed(2), loan.interestPaid,
                                loan.tenor, normaliseDate(loan.startDate), normaliseDate(loan.maturityDate)||'',
                                loan.marginCallThreshold, loan.originalCollateralRatio,
                                loan.status, loan.createdAt||''
                            ]))}`);
                        }
                    } catch(e) { console.error('Auto-mature push failed for '+loan.id+':', e.message); }
                }
                setLoans(fetchedLoans);
            }
            if (tr.success&&tr.values) setTransactions(tr.values.filter(r=>r[0]&&r[1]).map(r=>({id:r[0],loanId:r[1],type:r[2],amount:+r[3],timestamp:r[4]})));
        } catch(e){alert('Sync error: '+e.message);}
        setLoading(false);
    };
    useEffect(()=>{ if(config.scriptUrl){fetchSheets();const t=setInterval(fetchSheets,30000);return()=>clearInterval(t);} },[config.scriptUrl]);

    const addLoan = async (d) => {
        const loan = {...d, id:d.loanId||`LOAN-${Date.now()}`, interestPaid:0, tenor:calcTenor(d.startDate,d.maturityDate), status:'Active', createdAt:new Date().toISOString()};
        setLoans(p=>[...p, loan]);
        setShowAdd(false);
        // Append new loan row to Google Sheets
        if (config.scriptUrl) {
            try {
                const m = calcMetrics(loan);
                await fetch(`${config.scriptUrl}?action=append&sheetName=Loans&values=${encodeURIComponent(JSON.stringify([
                    loan.id, loan.counterparty, loan.loanAmount,
                    loan.underlying, loan.collateralAmount, loan.collateralType,
                    loan.interestRate, m.interest.toFixed(2), loan.interestPaid,
                    loan.tenor, normaliseDate(loan.startDate), normaliseDate(loan.maturityDate)||'',
                    loan.marginCallThreshold, loan.originalCollateralRatio,
                    loan.status, loan.createdAt, loan.secured===false?'Unsecured':'Secured'
                ]))}`);
            } catch(e) { console.error('Sheets addLoan failed:', e.message); }
        }
    };
    const updateLoan = async (loan) => {
        setLoans(p=>p.map(l=>l.id===loan.id?loan:l));
        setEditingLoan(null);
        // Push updated loan row to Google Sheets immediately
        if (config.scriptUrl) {
            try {
                const m = calcMetrics(loan);
                const lr = await fetch(`${config.scriptUrl}?action=read&sheetName=Loans`).then(r=>r.json());
                if (lr.success && lr.values) {
                    const rowIdx = lr.values.findIndex(r=>String(r[0]).trim()===String(loan.id).trim());
                    if (rowIdx >= 0) {
                        const sheetRow = rowIdx + 2;
                        await fetch(`${config.scriptUrl}?action=update&sheetName=Loans&rowIndex=${sheetRow}&values=${encodeURIComponent(JSON.stringify([
                            loan.id, loan.counterparty, loan.loanAmount,
                            loan.underlying, loan.collateralAmount, loan.collateralType,
                            loan.interestRate, m.interest.toFixed(2), loan.interestPaid,
                            loan.tenor, normaliseDate(loan.startDate), normaliseDate(loan.maturityDate)||'',
                            loan.marginCallThreshold, loan.originalCollateralRatio,
                            loan.status, loan.createdAt||'', loan.secured===false?'Unsecured':'Secured'
                        ]))}`);
                    }
                }
            } catch(e) { console.error('Sheets updateLoan failed:', e.message); }
        }
    };
    const addTxn = async (loanId,type,amount)=>{
        const txn = {id:`TXN-${Date.now()}`,loanId,type,amount:+amount,timestamp:new Date().toISOString()};
        // Update local state immediately so UI reflects change at once
        setTransactions(p=>[...p,txn]);
        const loan=loans.find(l=>l.id===loanId);
        let updatedLoan = null;
        if (loan){
            const u={...loan};
            if(type==='Collateral Top-up') u.collateralAmount+=+amount;
            else if(type==='Loan Repayment'){u.loanAmount-=+amount;if(u.loanAmount<=0)u.status='Repaid';}
            else if(type==='Interest Payment') u.interestPaid+=+amount;
            updateLoan(u);
            updatedLoan = u;
        }
        setShowTxn(null);
        // Push transaction and updated loan to Google Sheets
        // Must happen AFTER state update so Sheets reflects the latest values
        if (config.scriptUrl) {
            try {
                // 1. Append transaction row to Transactions sheet
                await fetch(`${config.scriptUrl}?action=append&sheetName=Transactions&values=${encodeURIComponent(JSON.stringify([
                    txn.id, txn.loanId, txn.type, txn.amount, txn.timestamp
                ]))}`);
                // 2. Update the loan row in Loans sheet with new collateral/amount/status
                if (updatedLoan) {
                    const m = calcMetrics(updatedLoan);
                    // Find row index in sheet (loans are 1-indexed, +2 for header)
                    // Use update action with rowIndex by finding the loan's position
                    // We append a fresh read then update — simpler: use append+dedup or find row
                    // The existing script uses rowIndex-based update, so we need to find the row.
                    // Fetch current loans sheet to find row number of this loan
                    const lr = await fetch(`${config.scriptUrl}?action=read&sheetName=Loans`).then(r=>r.json());
                    if (lr.success && lr.values) {
                        const rowIdx = lr.values.findIndex(r=>r[0]===updatedLoan.id);
                        if (rowIdx >= 0) {
                            const sheetRow = rowIdx + 2; // +1 for header, +1 for 1-indexing
                            await fetch(`${config.scriptUrl}?action=update&sheetName=Loans&rowIndex=${sheetRow}&values=${encodeURIComponent(JSON.stringify([
                                updatedLoan.id, updatedLoan.counterparty, updatedLoan.loanAmount,
                                updatedLoan.underlying, updatedLoan.collateralAmount, updatedLoan.collateralType,
                                updatedLoan.interestRate, m.interest.toFixed(2), updatedLoan.interestPaid,
                                updatedLoan.tenor, normaliseDate(updatedLoan.startDate), normaliseDate(updatedLoan.maturityDate)||'',
                                updatedLoan.marginCallThreshold, updatedLoan.originalCollateralRatio,
                                updatedLoan.status, updatedLoan.createdAt||'', updatedLoan.secured===false?'Unsecured':'Secured'
                            ]))}`);
                        }
                    }
                }
            } catch(e) { console.error('Sheets push failed:', e.message); }
        }
    };
    const exportCSV = ()=>{ const rows=loans.map(l=>{const m=calcMetrics(l);return[l.id,l.counterparty,l.loanAmount,l.underlying,l.collateralAmount,l.collateralType,l.interestRate,m.interest.toFixed(2),l.interestPaid,l.tenor,l.startDate,l.maturityDate,l.status,m.ratio.toFixed(2)].join(',');}); const csv=['ID,Counterparty,Loan,Currency,Collateral,CollType,Rate%,IntAccrued,IntPaid,Tenor,Start,Maturity,Status,Ratio%',...rows].join('\n'); const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`loans-${todayUTC()}.csv`;a.click(); };
    const filtered=loans.filter(l=>{
        if (filterStatus==='all') return true;
        if (filterStatus==='active') return l.status==='Active';
        if (filterStatus==='matured') return l.status==='Matured';
        if (filterStatus==='repaid') return l.status==='Repaid';
        if (filterStatus==='at-risk') return calcMetrics(l).atRisk;
        if (filterStatus==='unsecured') return l.secured===false||l.secured==='false';
        if (filterStatus==='open-term') return !l.maturityDate||l.maturityDate==='';
        return true;
    });

    return (
        <div>
            <LoanDashboard loans={loans} prices={prices} calcMetrics={calcMetrics}/>
            <div className="flex flex-wrap gap-2 mb-5 justify-between items-center">
                <div className="flex gap-2 flex-wrap">
                    <Select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="w-auto text-xs px-2 py-1.5"><option value="all">All</option><option value="active">Active</option><option value="at-risk">At Risk</option><option value="matured">Matured</option><option value="repaid">Repaid</option><option value="unsecured">Unsecured</option><option value="open-term">Open Term</option></Select>
                    {config.scriptUrl&&<button onClick={fetchSheets} disabled={loading} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5"><Icon.Refresh spin={loading}/> Sync</button>}
                    <button onClick={exportCSV} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5"><Icon.Download/> Export</button>
                    <button onClick={()=>setShowSettings(!showSettings)} className="btn-secondary px-3 py-1.5 rounded-lg text-xs flex items-center gap-1.5"><Icon.Settings/> Config</button>
                </div>
                <button onClick={()=>setShowAdd(true)} className="btn-primary px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><Icon.Plus/> New Loan</button>
            </div>
            {showSettings&&(
                <div className="card p-5 mb-5 space-y-5">
                    <div>
                        <h3 className="font-semibold mb-3 text-sm">Google Sheets Config — Loans</h3>
                        <Field label="Apps Script URL"><Input value={config.scriptUrl||''} onChange={e=>setConfig({...config,scriptUrl:e.target.value})} placeholder="https://script.google.com/macros/s/.../exec"/></Field>
                    </div>
                    <div className="border-t border-slate-700 pt-4">
                        <h3 className="font-semibold mb-1 text-sm flex items-center gap-2"><Icon.Alert/> Telegram Margin Call Alerts</h3>
                        <p className="text-xs text-slate-500 mb-3">24/7 server-side monitoring runs on Google's servers every 5 minutes — alerts fire even when this tab is closed. Paste your credentials here to test the connection, then add them to Script Properties in your Loans Apps Script.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <Field label="Bot Token" hint="From @BotFather — keep this private">
                                <Input value={config.telegramToken||''} onChange={e=>setConfig(p=>({...p,telegramToken:e.target.value}))} placeholder="123456789:ABCdef..."/>
                            </Field>
                            <Field label="Chat ID" hint="Your personal or group chat ID">
                                <Input value={config.telegramChatId||''} onChange={e=>setConfig(p=>({...p,telegramChatId:e.target.value}))} placeholder="-100123456789 or 123456789"/>
                            </Field>
                        </div>
                        <button onClick={async()=>{
                            if (!config.telegramToken||!config.telegramChatId) return alert('Enter both Bot Token and Chat ID first.');
                            try {
                                const res = await fetch(`https://api.telegram.org/bot${config.telegramToken}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:config.telegramChatId,text:'✅ SSPS Loan Manager connected. Margin call alerts are active.'})});
                                const d = await res.json();
                                if (d.ok) alert('✅ Test message sent successfully!');
                                else alert('❌ Telegram error: ' + d.description);
                            } catch(e) { alert('❌ Failed to reach Telegram: ' + e.message); }
                        }} className="btn-secondary px-3 py-1.5 rounded-lg text-xs mt-3 flex items-center gap-1.5">
                            <Icon.Refresh/> Send Test Message
                        </button>
                    </div>
                    <div className="flex gap-2 pt-2 border-t border-slate-700">
                        <button onClick={()=>{localStorage.setItem('cpb_loan_config',JSON.stringify(config));setShowSettings(false);}} className="btn-primary px-4 py-2 rounded-lg text-sm">Save</button>
                        <button onClick={()=>setShowSettings(false)} className="btn-secondary px-4 py-2 rounded-lg text-sm">Cancel</button>
                    </div>
                </div>
            )}
            {filtered.length===0?<div className="card p-12 text-center"><p className="text-slate-400">No loans found.</p></div>:(
                <div className="space-y-3">
                    {filtered.map(loan=>{
                        const m=calcMetrics(loan), txns=transactions.filter(t=>t.loanId===loan.id);
                        return(
                            <div key={loan.id} className={`card p-5 ${m.atRisk?'border-red-500/40 shadow-red-500/10 shadow-lg':''}`}>
                                <div className="flex flex-wrap justify-between items-start gap-3 mb-4">
                                    <div>
                                        <div className="flex items-center gap-2 flex-wrap">
                                            <h3 className="font-bold text-lg">{loan.counterparty}</h3>
                                            <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${loan.status==='Active'?'badge-active':loan.status==='Matured'?'badge-matured':'badge-repaid'}`}>{loan.status}</span>
                                            {m.isUnsecured&&<span className="px-2 py-0.5 rounded-full text-xs bg-purple-500/20 text-purple-300 border border-purple-500/30">Unsecured</span>}
                                            {(!loan.maturityDate||loan.maturityDate==='')&&<span className="px-2 py-0.5 rounded-full text-xs bg-blue-500/20 text-blue-300 border border-blue-500/30">Open Term</span>}
                                            {m.atRisk&&<span className="px-2 py-0.5 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/30 flex items-center gap-1"><Icon.Alert/> Margin Call</span>}
                                        </div>
                                        <p className="text-xs text-slate-500 mono mt-0.5">
                                            {loan.id} · {fmtDate(loan.startDate)} → {loan.maturityDate?fmtDate(loan.maturityDate):'Open Term'} {loan.tenor?`(${loan.tenor}d)`:''}
                                        </p>
                                    </div>
                                    <button onClick={()=>setEditingLoan(loan)} className="btn-secondary p-2 rounded-lg"><Icon.Edit/></button>
                                </div>
                                {/* Metric tiles — hide collateral/ratio/MC for unsecured loans */}
                                <div className={`grid grid-cols-2 gap-2 mb-4 ${m.isUnsecured?'md:grid-cols-3':'md:grid-cols-3 lg:grid-cols-6'}`}>
                                    {[
                                        ['Loan',`$${fmt(loan.loanAmount)}`,loan.underlying,'text-white',true],
                                        ['Interest',`$${fmt(m.interest)}`,`${loan.interestRate}% APR`,'text-yellow-400',true],
                                        ['Total Owed',`$${fmt(m.owed)}`,`Paid: $${fmt(loan.interestPaid)}`,'text-cyan-400',true],
                                        ['Collateral',`${fmtCrypto(loan.collateralAmount,6)} ${loan.collateralType}`,`≈$${fmt(m.collVal,0)}`,'text-white',!m.isUnsecured],
                                        ['Ratio',`${fmt(m.ratio)}%`,`Target: ${loan.originalCollateralRatio}%`,m.atRisk?'text-red-400':'text-green-400',!m.isUnsecured],
                                        ['MC Price',`$${fmt(m.mcPrice,0)}`,`@ ${loan.marginCallThreshold}%`,'text-orange-400',!m.isUnsecured],
                                    ].filter(([,,,,show])=>show).map(([lbl,val,sub,cls])=>(
                                        <div key={lbl} className="card-inner p-3"><p className="text-xs text-slate-400 mb-1">{lbl}</p><p className={`font-bold mono text-sm ${cls}`}>{val}</p><p className="text-xs text-slate-500">{sub}</p></div>
                                    ))}
                                </div>
                                {m.atRisk&&<div className="bg-red-900/20 border border-red-500/30 rounded-lg p-3 mb-3 text-sm">⚠️ Top-up needed: <span className="font-bold mono text-red-300">{fmtCrypto(m.topUp,8)} {loan.collateralType}</span></div>}
                                <div className="flex gap-2 flex-wrap">
                                    {/* Hide Collateral Top-up button for unsecured loans */}
                                    {!m.isUnsecured&&<button onClick={()=>setShowTxn({loanId:loan.id,type:'Collateral Top-up'})} className="px-3 py-1.5 bg-green-600/20 hover:bg-green-600/40 border border-green-500/30 rounded-lg text-xs text-green-400 flex items-center gap-1 transition-colors"><Icon.Plus/>Collateral Top-up</button>}
                                    <button onClick={()=>setShowTxn({loanId:loan.id,type:'Loan Repayment'})} className="px-3 py-1.5 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/30 rounded-lg text-xs text-blue-400 flex items-center gap-1 transition-colors"><Icon.Plus/>Loan Repayment</button>

// SSPS CORE LOGIC
// ═══════════════════════════════════════════════════════════════════════════════
const buildSchedule = (contract) => {
    const start=new Date(contract.tradeDate+'T00:00:00Z'), end=new Date(contract.maturityDate+'T00:00:00Z');
    const days=[]; let d=new Date(start);
    while(d<=end){ days.push(d.toISOString().split('T')[0]); d.setUTCDate(d.getUTCDate()+1); }
    return days;
};

// Returns computed ledger rows. Purchase only recorded if fixing price exists for that day (i.e. 4pm SGT has passed).
const computeLedger = (contract, priceHistory) => {
    const { notional, baseNotional, trigger, scalingFactor, discountFactor } = contract;
    const schedule = buildSchedule(contract);
    let rows=[], notionalLeft=notional, totalSpent=0, fullyInvested=false;
    // Track cumulative underlying as an INTEGER (satoshis = units × 1e8) to eliminate
    // IEEE 754 floating-point drift. Never convert back to float between iterations.
    let totalSats=0; // integer satoshis

    for (let i=0; i<schedule.length; i++) {
        const date=schedule[i];
        const ph=priceHistory[date];
        const fixingPrice = ph && ph[contract.underlying] ? ph[contract.underlying] : null;
        let dodChange=null, triggerHit=false, partNotional=0, underlyingBought=0, notionalUsed=0;

        if (fixingPrice !== null) {
            // Find the most recent prior day's fixing price
            let priorPrice=null;
            for (let j=i-1; j>=0; j--) {
                const pp=priceHistory[schedule[j]];
                if (pp && pp[contract.underlying]) { priorPrice=pp[contract.underlying]; break; }
            }
            if (priorPrice && i>0) { dodChange=(fixingPrice-priorPrice)/priorPrice; triggerHit=dodChange<=trigger; }

            // Day 0 = trade date = initial fixing only, no purchase
            if (i>0 && !fullyInvested && notionalLeft>0.01) {
                const scale=triggerHit?scalingFactor:1.0;
                // Step 1: work in integer cents to avoid IEEE 754 float issues.
                // e.g. 1111.11 * 100 = 111110.999... in float → Math.floor gives 111110 (wrong).
                // Converting to cents first (Math.round) gives exact integer 111111.
                const baseCents=Math.round(baseNotional*100);       // exact integer cents
                const scaledCents=Math.floor(baseCents*scale);      // floor AFTER scaling
                const scaledBase=scaledCents/100;                   // back to USDT, 2dp exact
                const leftCents=Math.round(notionalLeft*100);
                notionalUsed=Math.min(scaledCents,leftCents)/100;   // cap by notionalLeft, 2dp exact
                partNotional=notionalUsed;
                // Step 2: underlying bought = rounded notional ÷ discounted price → FLOOR to 8dp
                const rawUnderlying=notionalUsed/(fixingPrice*(1-discountFactor));
                const boughtSats=Math.floor(rawUnderlying*1e8); // integer satoshis, no rounding
                underlyingBought=boughtSats/1e8;                // float for display only
                // Step 3: accumulate as integers — exact, no drift
                totalSats+=boughtSats;
                notionalLeft=Math.round(Math.max(0,notionalLeft-notionalUsed)*100)/100;
                totalSpent=Math.round((totalSpent+notionalUsed)*100)/100;
                if (notionalLeft<=0.01) fullyInvested=true;
            }
        }
        // totalUnderlying for this row = exact integer sats converted to float for display
        rows.push({ date, fixingPrice, dodChange, triggerHit, partNotional, underlyingBought, notionalLeft, totalUnderlying:totalSats/1e8, totalSpent, becameFullyInvested: fullyInvested && i>0 && notionalUsed>0 });
    }
    return rows;
};

// ─── SHEETS HELPER ────────────────────────────────────────────────────────────
const sheetsCall = async (url, payload) => {
    const qs=Object.entries(payload).map(([k,v])=>`${k}=${encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)}`).join('&');
    const res=await fetch(`${url}?${qs}`);
    const data=await res.json();
    if (!data.success) throw new Error(data.error||'Sheets error');
    return data;
};

// TRADING DESK WIDGET
// ═══════════════════════════════════════════════════════════════════════════════
const TradingDeskWidget = ({contracts, priceHistory, livePrices}) => {
    const today = todayUTC();

    // Active, non-exhausted contracts only
    const activeContracts = useMemo(()=>contracts.filter(c=>{
        if (today>c.maturityDate) return false;
        const rows=computeLedger(c,priceHistory);
        const last=rows.filter(r=>r.fixingPrice).slice(-1)[0];
        const left=last?last.notionalLeft:c.notional;
        return left>0.01;
    }),[contracts,priceHistory,today]);

    // Underlyings actually in use (only show price info for these)
    const underlyings = [...new Set(activeContracts.map(c=>c.underlying))];

    // Last available fixing price per underlying.
    // Rules:
    //  - Only valid ISO YYYY-MM-DD keys
    //  - entry must have a positive numeric price for the symbol
    //  - entry must NOT be a fetchError-only entry (no valid price)
    //  - Sorted descending by date (ISO lexicographic = chronological)
    const lastFixing = useMemo(()=>{
        const result={};
        const sorted=Object.entries(priceHistory)
            .filter(([date,entry]) =>
                /^\d{4}-\d{2}-\d{2}$/.test(date) &&   // valid ISO date key
                entry && !entry.fetchError              // not a failed fetch
            )
            .sort((a,b)=>b[0].localeCompare(a[0]));   // newest first
        underlyings.forEach(sym=>{
            for (const [date,entry] of sorted) {
                const price = entry[sym];
                if (price && +price > 0) {
                    result[sym]={price:+price, date};
                    break;
                }
            }
        });
        return result;
    },[priceHistory,underlyings.join(',')]);

    // Per-underlying buy schedule
    const schedule = useMemo(()=>{
        const out={};
        underlyings.forEach(sym=>{
            const cs=activeContracts.filter(c=>c.underlying===sym);
            // Base: sum of all base notionals
            const baseTotal=cs.reduce((s,c)=>s+c.baseNotional,0);
            // Trigger groups: keyed by trigger value (e.g. -0.03)
            const groups={};
            cs.forEach(c=>{
                const k=c.trigger.toFixed(6);
                if (!groups[k]) groups[k]={trigger:c.trigger,additional:0};
                groups[k].additional+=c.baseNotional*(c.scalingFactor-1);
            });
            const triggerRows=Object.values(groups).sort((a,b)=>b.trigger-a.trigger); // least negative first
            out[sym]={baseTotal,triggerRows};
        });
        return out;
    },[activeContracts]);

    // Contracts expiring within 7 days — each listed individually
    const expiring = useMemo(()=>contracts
        .filter(c=>{ const d=daysUntil(c.maturityDate); return d>=0&&d<=7&&today<=c.maturityDate; })
        .map(c=>{
            const rows=computeLedger(c,priceHistory);
            const last=rows.filter(r=>r.fixingPrice).slice(-1)[0];
            return {...c, accumulated:last?last.totalUnderlying:0, daysLeft:daysUntil(c.maturityDate)};
        })
        .sort((a,b)=>a.daysLeft-b.daysLeft)
    ,[contracts,priceHistory,today]);

    if (activeContracts.length===0&&expiring.length===0) return null;

    return (
        <div className="trading-desk p-5 mb-6">
            {/* Header */}
            <div className="flex items-center gap-2 mb-5">
                <Icon.Desk/>
                <h2 className="font-bold text-sm text-cyan-300 uppercase tracking-wider">Trading Desk</h2>
                <span className="text-xs text-slate-500">· {activeContracts.length} active contract{activeContracts.length!==1?'s':''}</span>
            </div>

            {/* Price reference — only for underlyings in use */}
            {underlyings.length>0&&(
                <div className={`grid grid-cols-2 md:grid-cols-${underlyings.length*2} gap-3 mb-5`}>
                    {underlyings.map(sym=>(
                        <React.Fragment key={sym}>
                            <div className="card-inner p-3">
                                <p className="text-xs text-slate-400 mb-1">{sym} Last Fixing</p>
                                <p className="font-bold mono text-white text-sm">{lastFixing[sym]?`$${fmt(lastFixing[sym].price,2)}`:'—'}</p>
                                <p className="text-xs text-slate-500">{lastFixing[sym]?`${fmtDate(lastFixing[sym].date)} · 08:00 UTC`:'No data'}</p>
                            </div>
                            <div className="card-inner p-3">
                                <p className="text-xs text-slate-400 mb-1">{sym} Live Price</p>
                                <p className="font-bold mono text-white text-sm">{livePrices[sym]?`$${fmt(livePrices[sym],2)}`:'—'}</p>
                                <p className="text-xs text-slate-500">Bybit · 60s refresh</p>
                            </div>
                        </React.Fragment>
                    ))}
                </div>
            )}

            {/* Buy schedule — one table per underlying */}
            {underlyings.map(sym=>{
                const {baseTotal,triggerRows}=schedule[sym];
                const yestPrice=lastFixing[sym]?.price;
                return(
                    <div key={sym} className="mb-4">
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">{sym}/USDT · Buy Schedule</p>
                        <div className="overflow-x-auto scrollbar-hide rounded-lg border border-slate-800 overflow-hidden">
                            <table className="w-full text-xs">
                                <thead>
                                    <tr className="border-b border-slate-800 bg-slate-900/60">
                                        <th className="text-left px-4 py-2.5 text-slate-400 font-medium w-48">Scenario</th>
                                        <th className="text-left px-4 py-2.5 text-slate-400 font-medium">Trigger Price</th>
                                        <th className="text-right px-4 py-2.5 text-slate-400 font-medium">Buy Amount (USDT)</th>
                                        <th className="text-right px-4 py-2.5 text-slate-400 font-medium">Cumulative Total</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {/* Row 1: Base — always, no matter what price does */}
                                    <tr className="border-b border-slate-800/50 base-row">
                                        <td className="px-4 py-3 font-semibold text-cyan-300">Base (always)</td>
                                        <td className="px-4 py-3 text-slate-500 mono">—</td>
                                        <td className="px-4 py-3 text-right font-bold mono text-white">${fmt(baseTotal)}</td>
                                        <td className="px-4 py-3 text-right mono text-cyan-300 font-bold">${fmt(baseTotal)}</td>
                                    </tr>
                                    {/* One row per distinct trigger level */}
                                    {triggerRows.map(tr=>{
                                        const triggerPrice=yestPrice?yestPrice*(1+tr.trigger):null;
                                        return(
                                            <tr key={tr.trigger} className="border-b border-slate-800/50 trigger-row">
                                                <td className="px-4 py-3 text-red-400 flex items-center gap-1.5"><Icon.TrendDown/> If DoD ≤ {(tr.trigger*100).toFixed(2)}%</td>
                                                <td className="px-4 py-3 mono text-red-300 font-medium">
                                                    {triggerPrice?`$${fmt(triggerPrice,2)}`:<span className="text-slate-600 italic">need yesterday's price</span>}
                                                </td>
                                                <td className="px-4 py-3 text-right mono text-red-300">+${fmt(tr.additional)}</td>
                                                <td className="px-4 py-3 text-right mono font-bold text-red-300">${fmt(baseTotal+tr.additional)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            })}

            {/* Maturing within 7 days — each contract shown separately */}
            {expiring.length>0&&(
                <div>
                    <p className="text-xs font-semibold text-red-400 uppercase tracking-wider mb-2 flex items-center gap-1.5"><Icon.Calendar/> Maturing Within 7 Days — Sell Schedule</p>
                    <div className="overflow-x-auto scrollbar-hide rounded-lg border border-slate-800 overflow-hidden">
                        <table className="w-full text-xs">
                            <thead>
                                <tr className="border-b border-slate-800 bg-slate-900/60">
                                    <th className="text-left px-4 py-2.5 text-slate-400 font-medium">Client</th>
                                    <th className="text-left px-4 py-2.5 text-slate-400 font-medium">Contract ID</th>
                                    <th className="text-left px-4 py-2.5 text-slate-400 font-medium">Asset</th>
                                    <th className="text-left px-4 py-2.5 text-slate-400 font-medium">Maturity Date</th>
                                    <th className="text-right px-4 py-2.5 text-slate-400 font-medium">Days Left</th>
                                    <th className="text-right px-4 py-2.5 text-slate-400 font-medium">Amount to Sell</th>
                                    <th className="text-right px-4 py-2.5 text-slate-400 font-medium">Est. Value (Live)</th>
                                </tr>
                            </thead>
                            <tbody>
                                {expiring.map(c=>(
                                    <tr key={c.id} className="border-b border-slate-800/50 sell-row">
                                        <td className="px-4 py-3 font-medium text-slate-200">{c.clientName}</td>
                                        <td className="px-4 py-3 mono text-slate-400 text-xs">{c.id}</td>
                                        <td className="px-4 py-3">
                                            <span className={`px-1.5 py-0.5 rounded text-xs font-medium ${c.underlying==='BTC'?'bg-orange-500/15 text-orange-400':'bg-purple-500/15 text-purple-400'}`}>{c.underlying}</span>
                                        </td>
                                        <td className="px-4 py-3 mono text-slate-300">{fmtDate(c.maturityDate)}</td>
                                        <td className={`px-4 py-3 text-right font-bold mono ${c.daysLeft===0?'text-red-400':c.daysLeft<=2?'text-red-400':c.daysLeft<=4?'text-yellow-400':'text-slate-300'}`}>
                                            {c.daysLeft===0?'TODAY':c.daysLeft===1?'TOMORROW':`${c.daysLeft}d`}
                                        </td>
                                        <td className="px-4 py-3 text-right mono font-bold text-red-300">
                                            {fmtCrypto(c.accumulated,8)} {c.underlying}
                                        </td>
                                        <td className="px-4 py-3 text-right mono text-slate-300">
                                            {livePrices[c.underlying]&&c.accumulated>0?`$${fmt(c.accumulated*livePrices[c.underlying],0)}`:'—'}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
        </div>
    );
};

// SSPS MODULE
